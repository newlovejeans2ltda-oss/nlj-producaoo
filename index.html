    const ent = ls.filter(l=>l.tipo==='RECEITA').reduce((a,l)=>a+l.valor,0);
    const sai = ls.filter(l=>l.tipo!=='RECEITA').reduce((a,l)=>a+l.valor,0);
    const cor = BANCO_CORES_EXT[b]||'#6B7280';
    return {banco:b, total:ls.length, ent, sai, saldo:ent-sai, cor,
            ls: ls.sort((a,b2)=>b2.data.localeCompare(a.data)).slice(0,5)};
  });
  const bancosComDados = porBanco.filter(b=>b.total>0);

  // Por categoria
  const porCateg = BANCO_TIPOS.map(t=>{
    const ls = lancamentos.filter(l=>l.categ===t);
    return {categ:t, total:ls.length, valor:ls.reduce((a,l)=>a+l.valor,0)};
  }).filter(t=>t.total>0).sort((a,b)=>b.valor-a.valor);

  // Evolução mensal
  const meses = [...new Set(lancamentos.map(l=>l.data?.slice(0,7)).filter(Boolean))].sort();
  const evolucao = meses.map(m=>{
    const ls = lancamentos.filter(l=>l.data?.slice(0,7)===m);
    const ent = ls.filter(l=>l.tipo==='RECEITA').reduce((a,l)=>a+l.valor,0);
    const sai = ls.filter(l=>l.tipo!=='RECEITA').reduce((a,l)=>a+l.valor,0);
    const [y,mo] = m.split('-');
    const nomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return {mes:`${nomes[Number(mo)-1]}/${y.slice(2)}`, ent, sai, saldo:ent-sai};
  });

  // Últimos lançamentos
  const ultimos = [...lancamentos].sort((a,b)=>b.data.localeCompare(a.data)).slice(0,10);

  // Filtros estado
  const mesesDisp = [...new Set(lancamentos.map(l=>l.data?.slice(0,7)).filter(Boolean))].sort().reverse();
  const aba = bancoState.aba || 'dashboard';

  document.getElementById('page-banco').innerHTML = `
  <div style="padding:20px 28px;max-width:1500px">

    <!-- HEADER -->
    <div class="flex-sb" style="margin-bottom:20px">
      <div>
        <div style="color:var(--t3);font-size:10px;font-family:monospace;letter-spacing:2px;margin-bottom:2px">GESTÃO FINANCEIRA</div>
        <h1 style="color:var(--t1);font-size:36px;font-weight:800;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif">CONCILIAÇÃO BANCÁRIA</h1>
      </div>
      <div style="display:flex;gap:9px">
        <button onclick="abrirImportacao()" style="display:flex;align-items:center;gap:7px;background:var(--bgcard);border:1.5px solid #BAE6FD;color:#0EA5E9;border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:monospace">
          ${icon('upload',14,'#0EA5E9')} IMPORTAR EXTRATO
        </button>
        <button onclick="abrirNovoLancamento()" class="btn btn-primary">
          ${icon('plus',14)} LANÇAMENTO MANUAL
        </button>
      </div>
    </div>

    <!-- KPIs SALDO GERAL -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px">
      <div class="kpi" style="--kpi-color:${saldoGeral>=0?'#10B981':'#EF4444'};border-top:4px solid ${saldoGeral>=0?'#10B981':'#EF4444'}">
        <div class="flex-sb"><div>
          <div class="kpi-title">SALDO GERAL</div>
          <div style="font-size:28px;font-weight:900;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;color:${saldoGeral>=0?'#10B981':'#EF4444'};line-height:1">
            ${saldoGeral<0?'-':''}R$ ${fmt(Math.abs(saldoGeral))}
          </div>
          <div style="font-size:10px;color:var(--t3);font-family:monospace;margin-top:3px">${lancamentos.length} lançamentos</div>
        </div><div class="kpi-icon">${icon('bank',22,saldoGeral>=0?'#10B981':'#EF4444')}</div></div>
        <div style="margin-top:10px;background:${saldoGeral>=0?'#DCFCE7':'#FEE2E2'};border-radius:20px;padding:3px 10px;display:inline-block;font-size:10px;font-family:monospace;font-weight:700;color:${saldoGeral>=0?'#059669':'#DC2626'}">
          ${saldoGeral>=0?'✓ POSITIVO':'⚠ NEGATIVO'}
        </div>
      </div>
      <div class="kpi" style="--kpi-color:#10B981"><div class="flex-sb"><div>
        <div class="kpi-title">TOTAL ENTRADAS</div>
        <div class="kpi-value">R$ ${fmt(totalEnt)}</div>
        <div class="kpi-sub" style="color:#10B981">${lancamentos.filter(l=>l.tipo==='RECEITA').length} lançamentos</div>
      </div><div class="kpi-icon">${icon('arrow_up',22,'#10B981')}</div></div></div>
      <div class="kpi" style="--kpi-color:#EF4444"><div class="flex-sb"><div>
        <div class="kpi-title">TOTAL SAÍDAS</div>
        <div class="kpi-value">R$ ${fmt(totalSai)}</div>
        <div class="kpi-sub" style="color:#EF4444">${lancamentos.filter(l=>l.tipo!=='RECEITA').length} lançamentos</div>
      </div><div class="kpi-icon">${icon('trending',22,'#EF4444')}</div></div></div>
      <div class="kpi" style="--kpi-color:${semCateg>0?'#F59E0B':'#10B981'}"><div class="flex-sb"><div>
        <div class="kpi-title">SEM CATEGORIA</div>
        <div class="kpi-value" style="color:${semCateg>0?'#F59E0B':'#10B981'}">${semCateg}</div>
        <div class="kpi-sub">${semCateg>0?'classificar pendente':'tudo classificado ✓'}</div>
      </div><div class="kpi-icon">${icon('filter',22,semCateg>0?'#F59E0B':'#10B981')}</div></div></div>
    </div>

    <!-- ABAS -->
    <div style="display:flex;gap:6px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0">
      ${[
        {l:'📊 Dashboard',    v:'dashboard'},
        {l:'🏦 Por Banco',    v:'porBanco'},
        {l:'📋 Lançamentos',  v:'lancamentos'},
      ].map(t=>`
        <button onclick="bancoState.aba='${t.v}';renderBanco()"
          style="padding:10px 18px;font-size:12px;font-weight:700;font-family:monospace;border:none;cursor:pointer;border-radius:9px 9px 0 0;transition:all .15s;
                 background:${aba===t.v?'var(--bgcard)':'transparent'};
                 color:${aba===t.v?'var(--t1)':'var(--t3)'};
                 border-bottom:${aba===t.v?'3px solid #0EA5E9':'3px solid transparent'};
                 margin-bottom:-2px">${t.l}</button>`).join('')}
    </div>

    <!-- CONTEÚDO DAS ABAS -->
    ${aba==='dashboard' ? renderBancoDashboard(bancosComDados,evolucao,porCateg,ultimos,saldoGeral) : ''}
    ${aba==='porBanco'  ? renderBancoPorBanco(bancosComDados) : ''}
    ${aba==='lancamentos' ? renderBancoLancamentos(lancamentos, mesesDisp) : ''}
  </div>`;

  // Charts
  requestAnimationFrame(()=>{
    if(aba==='dashboard') renderBancoCharts(bancosComDados, evolucao, porCateg);
    if(aba==='porBanco')  renderBancoPorBancoCharts(bancosComDados);
  });
}

// ── ABA DASHBOARD ──
function renderBancoDashboard(bancosComDados, evolucao, porCateg, ultimos, saldoGeral) {
  const fmtD = d => { if(!d) return '—'; const p=d.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d; };
  return `
  <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px">
    <!-- Evolução mensal -->
    <div class="card">
      <div class="card-header">
        <div><div class="ch-sub">Histórico mensal</div><div class="ch-title">Entradas × Saídas × Saldo</div></div>
      </div>
      <div style="padding:14px 18px">
        ${evolucao.length===0?`<div style="padding:32px;text-align:center;color:var(--t3);font-family:monospace">Nenhum dado importado ainda.</div>`:`<canvas id="chart-banco-evolucao" height="200"></canvas>`}
      </div>
    </div>
    <!-- Pizza categorias -->
    <div class="card">
      <div class="card-header"><div><div class="ch-sub">Distribuição</div><div class="ch-title">Saídas por Categoria</div></div></div>
      <div style="padding:10px">
        ${porCateg.length===0?`<div style="padding:32px;text-align:center;color:var(--t3);font-family:monospace">Sem categorias.</div>`:`<canvas id="chart-banco-categ" height="180"></canvas>`}
        <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px">
          ${porCateg.map(c=>{const cores=BANCO_TIPO_CORES[c.categ]||['#F3F4F6','#6B7280'];return`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:${cores[1]}"></div><span style="font-size:10px;font-family:monospace;color:var(--t2)">${c.categ}</span></div>`;}).join('')}
        </div>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px">
    <!-- Saldo por banco barras -->
    <div class="card">
      <div class="card-header"><div><div class="ch-sub">Comparativo</div><div class="ch-title">Saldo por Banco</div></div></div>
      <div style="padding:10px 16px">
        ${bancosComDados.length===0?`<div style="padding:24px;text-align:center;color:var(--t3)">Importe extratos para ver dados.</div>`:
        bancosComDados.map(b=>{
          const max = Math.max(...bancosComDados.map(x=>Math.abs(x.saldo)),1);
          const pct = Math.min(100,Math.abs(b.saldo)/max*100);
          return `<div style="margin-bottom:12px">
            <div class="flex-sb" style="margin-bottom:4px">
              <div style="display:flex;align-items:center;gap:7px">
                <div style="width:10px;height:10px;border-radius:3px;background:${b.cor}"></div>
                <span style="font-size:12px;font-weight:700;color:var(--t1)">${b.banco}</span>
              </div>
              <span style="font-family:monospace;font-size:12px;font-weight:800;color:${b.saldo>=0?'#10B981':'#EF4444'}">${b.saldo<0?'-':''}R$ ${fmt(Math.abs(b.saldo))}</span>
            </div>
            <div style="background:var(--border);border-radius:20px;height:8px;overflow:hidden">
              <div style="background:${b.saldo>=0?b.cor:'#EF4444'};width:${pct}%;height:100%;border-radius:20px;transition:width .5s"></div>
            </div>
            <div class="flex-sb" style="margin-top:2px">
              <span style="font-size:10px;color:#10B981;font-family:monospace">+${fmt(b.ent)}</span>
              <span style="font-size:10px;color:#EF4444;font-family:monospace">-${fmt(b.sai)}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Donut bancos -->
    <div class="card">
      <div class="card-header"><div><div class="ch-sub">Volume</div><div class="ch-title">Lançamentos por Banco</div></div></div>
      <div style="padding:10px">
        ${bancosComDados.length===0?`<div style="padding:24px;text-align:center;color:var(--t3)">Sem dados.</div>`:`<canvas id="chart-banco-donut" height="170"></canvas>`}
        <div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:6px">
          ${bancosComDados.map(b=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:${b.cor}"></div><span style="font-size:10px;font-family:monospace;color:var(--t2)">${b.banco}(${b.total})</span></div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Top categorias -->
    <div class="card">
      <div class="card-header"><div><div class="ch-sub">Maiores gastos</div><div class="ch-title">Ranking por Categoria</div></div></div>
      <div style="padding:8px 0">
        ${porCateg.length===0?`<div style="padding:24px;text-align:center;color:var(--t3)">Categorize os lançamentos.</div>`:
        porCateg.slice(0,7).map((c,i)=>{
          const cores=BANCO_TIPO_CORES[c.categ]||['#F3F4F6','#6B7280'];
          const maxVal = porCateg[0].valor||1;
          const pct = Math.min(100,c.valor/maxVal*100);
          return `<div style="padding:9px 16px;border-bottom:1px solid var(--border)">
            <div class="flex-sb" style="margin-bottom:4px">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:12px;font-weight:700;color:var(--t3);font-family:monospace;min-width:16px">#${i+1}</span>
                <span style="background:${cores[0]};color:${cores[1]};border-radius:20px;padding:2px 8px;font-size:10px;font-family:monospace;font-weight:700">${c.categ}</span>
                <span style="font-size:10px;color:var(--t3);font-family:monospace">${c.total} reg.</span>
              </div>
              <span style="font-family:monospace;font-size:12px;font-weight:700;color:var(--t1)">R$ ${fmt(c.valor)}</span>
            </div>
            <div style="background:var(--border);border-radius:20px;height:4px;overflow:hidden">
              <div style="background:${cores[1]};width:${pct}%;height:100%;border-radius:20px"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <!-- Últimos lançamentos -->
  <div class="card">
    <div class="card-header">
      <div><div class="ch-sub">Mais recentes</div><div class="ch-title">Últimos 10 Lançamentos</div></div>
      <button onclick="bancoState.aba='lancamentos';renderBanco()"
        style="background:transparent;border:1px solid var(--border);color:var(--t2);border-radius:7px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:monospace">
        VER TODOS →
      </button>
    </div>
    <div style="display:grid;grid-template-columns:80px 55px 90px 1fr 100px 100px 90px;padding:7px 16px;background:#F5EFE3;border-bottom:1px solid var(--border)">
      ${['DATA','TIPO','BANCO','DESCRIÇÃO','CATEGORIA','VALOR',''].map(h=>`<span style="color:var(--t3);font-size:10px;font-family:monospace;font-weight:700">${h}</span>`).join('')}
    </div>
    ${ultimos.length===0?`<div style="padding:32px;text-align:center;color:var(--t3);font-family:monospace">Nenhum lançamento. Importe um extrato.</div>`:
    ultimos.map((l,i)=>{
      const ent=l.tipo==='RECEITA';
      const cores=BANCO_TIPO_CORES[l.categ]||['#F3F4F6','#6B7280'];
      const bcor=BANCO_CORES_EXT[l.banco]||'#6B7280';
      return `<div style="display:grid;grid-template-columns:80px 55px 90px 1fr 100px 100px 90px;padding:9px 16px;border-bottom:1px solid var(--border);background:${i%2===0?'var(--bgcard)':'#FAF7F0'};align-items:center;border-left:3px solid ${ent?'#10B981':'#EF4444'}">
        <span style="font-family:monospace;color:var(--t3);font-size:11px">${fmtD(l.data)}</span>
        <span style="font-family:monospace;font-size:10px;font-weight:700;color:${ent?'#10B981':'#EF4444'}">${ent?'↑ ENT':'↓ SAÍ'}</span>
        <span style="background:${bcor}18;color:${bcor};border:1px solid ${bcor}33;border-radius:20px;padding:1px 7px;font-size:10px;font-family:monospace;font-weight:700">${l.banco||'—'}</span>
        <span style="color:var(--t1);font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(l.nome)}</span>
        ${l.categ?`<span style="background:${cores[0]};color:${cores[1]};border-radius:20px;padding:2px 8px;font-size:10px;font-family:monospace;font-weight:700">${l.categ}</span>`:
          `<select onchange="categorizar(${l.id},this.value)" style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:7px;padding:3px 6px;font-size:10px;color:#C2410C;font-family:monospace;cursor:pointer;outline:none;font-weight:700">
            <option value="">⚠ Categorizar</option>
            ${BANCO_TIPOS.map(t=>`<option value="${t}">${t}</option>`).join('')}
          </select>`}
        <span style="font-family:monospace;font-size:13px;font-weight:700;text-align:right;color:${ent?'#10B981':'#EF4444'}">${ent?'+':'-'}R$ ${fmt(l.valor)}</span>
        <button onclick="categorizar(${l.id},'',true)" style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:10px;color:#3B82F6;font-family:monospace;font-weight:700;margin-left:4px">✏ Edit</button>
      </div>`;
    }).join('')}
  </div>`;
}

// ── ABA POR BANCO ──
function renderBancoPorBanco(bancosComDados) {
  if(bancosComDados.length===0) return `<div style="padding:48px;text-align:center;color:var(--t3);font-family:monospace;font-size:14px">Nenhum banco com dados.<br/>Importe extratos para ver.</div>`;
  const fmtD = d => { if(!d) return '—'; const p=d.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d; };
  return `
  <div style="margin-bottom:16px">
    <canvas id="chart-banco-comparativo" height="120"></canvas>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">
    ${bancosComDados.map(b=>`
    <div class="card" style="border-top:4px solid ${b.cor}">
      <div style="padding:16px 18px">
        <!-- Header banco -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:40px;height:40px;border-radius:10px;background:${b.cor};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif">${b.banco[0]}</div>
            <div>
              <div style="font-size:16px;font-weight:800;color:var(--t1);font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif">${b.banco}</div>
              <div style="font-size:10px;color:var(--t3);font-family:monospace">${b.total} lançamentos</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:10px;color:var(--t3);font-family:monospace">SALDO</div>
            <div style="font-size:20px;font-weight:900;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;color:${b.saldo>=0?'#10B981':'#EF4444'}">${b.saldo<0?'-':''}R$ ${fmt(Math.abs(b.saldo))}</div>
          </div>
        </div>
        <!-- Entradas/Saídas -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div style="background:#ECFDF5;border-radius:8px;padding:10px 12px;text-align:center">
            <div style="font-size:10px;font-family:monospace;color:#059669;margin-bottom:2px">ENTRADAS</div>
            <div style="font-size:15px;font-weight:700;color:#10B981;font-family:monospace">+R$ ${fmt(b.ent)}</div>
          </div>
          <div style="background:#FEF2F2;border-radius:8px;padding:10px 12px;text-align:center">
            <div style="font-size:10px;font-family:monospace;color:#DC2626;margin-bottom:2px">SAÍDAS</div>
            <div style="font-size:15px;font-weight:700;color:#EF4444;font-family:monospace">-R$ ${fmt(b.sai)}</div>
          </div>
        </div>
        <!-- Últimos lançamentos deste banco -->
        ${b.ls.length>0?`
        <div style="font-size:10px;font-family:monospace;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Últimos lançamentos</div>
        ${b.ls.map(l=>{
          const ent=l.tipo==='RECEITA';
          return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:10px;font-family:monospace;color:var(--t3);white-space:nowrap">${fmtD(l.data)}</span>
            <span style="flex:1;font-size:11px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(l.nome)}</span>
            <span style="font-family:monospace;font-size:12px;font-weight:700;white-space:nowrap;color:${ent?'#10B981':'#EF4444'}">${ent?'+':'-'}R$ ${fmt(l.valor)}</span>
          </div>`;
        }).join('')}`:``}
      </div>
    </div>`).join('')}
  </div>`;
}

// ── ABA LANÇAMENTOS (tabela completa com filtros) ──
function renderBancoLancamentos(lancamentos, mesesDisp) {
  const fmtD = d => { if(!d) return '—'; const p=d.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d; };
  let lista = [...lancamentos];
  if(bancoState.busca)      lista = lista.filter(l=>l.nome.toLowerCase().includes(bancoState.busca.toLowerCase()));
  if(bancoState.filtroBanco) lista = lista.filter(l=>l.banco===bancoState.filtroBanco);
  if(bancoState.filtroCateg) lista = lista.filter(l=>l.categ===bancoState.filtroCateg);
  if(bancoState.filtroMes)   lista = lista.filter(l=>l.data?.slice(0,7)===bancoState.filtroMes);
  if(bancoState.filtroTipo)  lista = lista.filter(l=>l.tipo===bancoState.filtroTipo);
  lista.sort((a,b)=>b.data.localeCompare(a.data));
  const totalFiltrado = lista.reduce((a,l)=>a+(l.tipo==='RECEITA'?l.valor:-l.valor),0);

  const COLS = '82px 52px 88px 1fr 100px 110px 68px 36px';
  return `
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
    <div style="flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--bgcard);border:1px solid var(--border);border-radius:9px;padding:0 12px">
      ${icon('search',13,'#8C7A62')}

let _dadosImportacao = [];

function processarArquivo(file) {
  if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();

  reader.onload = function(e) {
    const conteudo = e.target.result;
    let linhas = [];

    if(ext === 'ofx') {
      linhas = parseOFX(conteudo);
    } else if(ext === 'csv' || ext === 'txt') {
      linhas = parseCSV(conteudo);
    } else if(ext === 'xml') {
      linhas = parseXML(conteudo);
    } else {
      showToast('Formato não suportado. Use OFX, CSV ou XML.','error'); return;
    }

    _dadosImportacao = linhas;
    mostrarPreviewImportacao(linhas, file.name);
  };
  reader.readAsText(file, 'latin1');
}

function parseOFX(txt) {
  const lancamentos = [];
  const transacoes = txt.match(/<STMTTRN>([\s\S]*?)<\/STMTTRN>/gi) || [];
  transacoes.forEach(t => {
    const get = (tag) => { const m = t.match(new RegExp(`<${tag}>([^<]+)`,'i')); return m?m[1].trim():''; };
    const trntype = get('TRNTYPE');
    const dtpost  = get('DTPOSTED');
    const trnamt  = get('TRNAMT').replace(',','.');
    const memo    = get('MEMO') || get('NAME') || '';
    const valor   = Math.abs(parseFloat(trnamt)||0);
    if(!valor) return;
    // Formatar data OFX: YYYYMMDD → YYYY-MM-DD
    const data = dtpost.length>=8 ? dtpost.slice(0,4)+'-'+dtpost.slice(4,6)+'-'+dtpost.slice(6,8) : '';
    lancamentos.push({
      data, nome: memo, valor,
      tipo: (trntype==='CREDIT'||parseFloat(trnamt)>0) ? 'RECEITA' : 'SAIDA',
      categ:'', obs:'', metodo:'', mes: _mesDaData(data), origem:'ofx',
    });
  });
  return lancamentos;
}

function parseCSV(txt) {
  const lancamentos = [];
  const linhas = txt.split(/\r?\n/).filter(l=>l.trim());
  if(linhas.length < 2) return lancamentos;
  // Detectar separador
  const sep = linhas[0].includes(';') ? ';' : ',';
  const header = linhas[0].split(sep).map(h=>h.trim().replace(/"/g,'').toUpperCase());
  // Mapear colunas por nome
  const iData  = header.findIndex(h=>h.includes('DATA')||h.includes('DATE'));
  const iDesc  = header.findIndex(h=>h.includes('HIST')||h.includes('DESC')||h.includes('NOME')||h.includes('MEMO'));
  const iValor = header.findIndex(h=>h.includes('VALOR')||h.includes('VALUE')||h.includes('AMOUNT'));
  const iTipo  = header.findIndex(h=>h.includes('TIPO')||h.includes('TYPE'));

  for(let i=1;i<linhas.length;i++) {
    const cols = linhas[i].split(sep).map(c=>c.trim().replace(/^"|"$/g,''));
    const dataRaw = iData>=0 ? cols[iData]||'' : '';
    const nome    = iDesc>=0 ? cols[iDesc]||'' : linhas[i];
    const valRaw  = iValor>=0 ? cols[iValor]||'0' : '0';
    const tipoRaw = iTipo>=0 ? cols[iTipo]||'' : '';
    const valor   = Math.abs(parseFloat(valRaw.replace(/[^\d.,-]/g,'').replace(',','.'))||0);
    if(!valor && !nome) continue;
    // Formatar data
    let data = '';
    const dm = dataRaw.match(/(\d{2})\/(\d{2})\/(\d{4})/);
    const dm2 = dataRaw.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(dm)  data = `${dm[3]}-${dm[2]}-${dm[1]}`;
    else if(dm2) data = dataRaw.slice(0,10);
    const isEntrada = tipoRaw.toUpperCase().includes('CRED')||tipoRaw.toUpperCase().includes('ENTR')||parseFloat(valRaw.replace(',','..'))>0;
    lancamentos.push({
      data, nome, valor, tipo: isEntrada?'RECEITA':'SAIDA',
      categ:'', obs:'', metodo:'', mes:_mesDaData(data), origem:'csv',
    });
  }
  return lancamentos;
}

function parseXML(txt) {
  const lancamentos = [];
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(txt, 'text/xml');
    // Tentar tags comuns
    const tags = ['STMTTRN','lancamento','transacao','entry','transaction'];
    let nodes = [];
    for(const tag of tags) {
      nodes = [...doc.getElementsByTagName(tag)];
      if(nodes.length>0) break;
    }
    nodes.forEach(n=>{
      const get = t => n.getElementsByTagName(t)[0]?.textContent?.trim()||'';
      const valor = Math.abs(parseFloat((get('TRNAMT')||get('valor')||get('amount')||'0').replace(',','.'))||0);
      const data  = get('DTPOSTED')||get('data')||get('date')||'';
      const nome  = get('MEMO')||get('descricao')||get('description')||get('NAME')||'';
      if(!valor) return;
      const dataFmt = data.length>=8&&!data.includes('-') ? data.slice(0,4)+'-'+data.slice(4,6)+'-'+data.slice(6,8) : data.slice(0,10);
      lancamentos.push({
        data:dataFmt, nome, valor, tipo:'SAIDA',
        categ:'', obs:'', metodo:'', mes:_mesDaData(dataFmt), origem:'xml',
      });
    });
  } catch(e) { showToast('Erro ao ler XML.','error'); }
  return lancamentos;
}

function _mesDaData(data) {
  if(!data) return '';
  const nomes = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
  const m = parseInt(data.slice(5,7));
  return nomes[m-1]||'';
}

function confirmarImportacao() {
  if(!_dadosImportacao.length){ showToast('Nenhum dado para importar.','error'); return; }

  const novos = _dadosImportacao.map(l=>({...l, id:Date.now()+Math.random(), banco}));
  STATE.banco.lancamentos.unshift(...novos);
  _dadosImportacao = [];
  showToast(`${novos.length} lançamentos importados!`);
  closeModal(); renderBanco();
}

let _nfeDados = null;

function nfeProcessarTexto() {
  const txt = document.getElementById('nfe-xml-text')?.value;
  if(!txt||!txt.trim()){ showToast('Cole o XML no campo acima.','error'); return; }
  _nfeParseXML(txt);
}

function nfeProcessarArquivo(file) {
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => _nfeParseXML(e.target.result);
  reader.readAsText(file, 'UTF-8');
}

function _nfeParseXML(txt) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(txt, 'text/xml');
    const err = doc.querySelector('parsererror');
    if(err) { showToast('XML inválido. Verifique o arquivo.','error'); return; }

    const get  = (el, tag) => el?.getElementsByTagName(tag)?.[0]?.textContent?.trim() || '';
    const getF = (el, tag) => parseFloat(get(el, tag).replace(',','.')) || 0;

    // Dados da nota
    const infNFe   = doc.getElementsByTagName('infNFe')[0];
    const emit     = doc.getElementsByTagName('emit')[0];
    const ide      = doc.getElementsByTagName('ide')[0];
    const total    = doc.getElementsByTagName('ICMSTot')[0];

    const numero    = get(ide,'nNF') || get(infNFe,'nNF') || ('NF-'+Date.now());
    const serie     = get(ide,'serie') || '1';
    const dataEmit  = get(ide,'dhEmi') || get(ide,'dEmi') || '';
    const data      = dataEmit ? dataEmit.slice(0,10) : today();
    const fornecedor= get(emit,'xNome') || get(emit,'xFant') || 'Fornecedor';
    const cnpj      = get(emit,'CNPJ') || '';
    const valorNF   = getF(total,'vNF') || getF(total,'vProd');

    // Itens
    const dets = [...doc.getElementsByTagName('det')];
    const itens = dets.map(det => {
      const prod = det.getElementsByTagName('prod')[0];
      const nome     = get(prod,'xProd');
      const qtd      = getF(prod,'qCom') || getF(prod,'qTrib') || 1;
      const unid     = get(prod,'uCom') || get(prod,'uTrib') || 'UN';
      const valorUnit= getF(prod,'vUnCom') || getF(prod,'vUnTrib');
      const valorTotal= getF(prod,'vProd');
      const ncm      = get(prod,'NCM') || '';
      const categoria = _detectarCategoria(nome);
      return { nome, qtd, unid, valorUnit, valorTotal, ncm, categoria, obs:'' };
    });

    if(itens.length === 0) { showToast('Nenhum item encontrado no XML.','error'); return; }

    _nfeDados = { numero, serie, data, fornecedor, cnpj, valor: valorNF || itens.reduce((a,i)=>a+i.valorTotal,0), itens };
    _nfeMostrarPreview(_nfeDados);

  } catch(e) {
    showToast('Erro ao processar XML: '+e.message,'error');
    console.error(e);
  }
}

// ── LANÇAR NO ESTOQUE ──
// ── Similaridade entre dois nomes (0 a 1) ──
function _nfeSimilaridade(a, b) {
  const na = a.toUpperCase().replace(/[^A-Z0-9]/g,' ').trim();
  const nb = b.toUpperCase().replace(/[^A-Z0-9]/g,' ').trim();
  if(na===nb) return 1;
  const wa = na.split(/\s+/).filter(x=>x.length>2);
  const wb = nb.split(/\s+/).filter(x=>x.length>2);
  if(!wa.length||!wb.length) return 0;
  const match = wa.filter(w=>wb.some(v=>v.includes(w)||w.includes(v)));
  return match.length / Math.max(wa.length, wb.length);
}

function nfeLancarEstoque(notaId) {
  const nota = STATE.nfe.notas.find(n=>n.id===notaId);
  if(!nota){ showToast('Nota não encontrada.','error'); return; }
  if(nota.lancadoEstoque){ showToast('Esta nota já foi lançada no estoque.','error'); return; }

  const mapa = nota.itens.map((item, idx) => {
    const nome = item.nome.trim().toUpperCase();
    const qtd  = Number(item.qtd)||0;
    let match=null, matchScore=0, destino='', isNovo=false;

    if(item.categoria==='tecido') {
      destino='tecido';
      STATE.estoque.tecidos.forEach(t=>{
        const s=_nfeSimilaridade(nome,t.nome);
        if(s>matchScore){matchScore=s;match=t;}
      });
      isNovo = matchScore<0.4;
    } else if(item.categoria==='ziper') {
      destino='ziper';
      const tamM=nome.match(/\b(\d{1,2})\s*(?:CM|MM)?\b/);
      const tam=tamM?Number(tamM[1]):15;
      const cor=nome.includes('BRAN')?'branco':'escuro';
      const ref=STATE.estoque.zipers.find(z=>z.tam===tam);
      match={_tam:tam,_cor:cor,_ref:ref};
      matchScore=ref?0.9:0; isNovo=!ref;
    } else {
      destino='aviamento';
      STATE.estoque.aviamentos.forEach(a=>{
        const s=_nfeSimilaridade(nome,a.nome);
        if(s>matchScore){matchScore=s;match=a;}
      });
      isNovo=matchScore<0.4;
    }
    return {idx,item,nome,qtd,destino,match,matchScore,isNovo};
  });

  _nfeMostrarConfirmacaoLancamento(notaId, mapa);
}

function _nfeExecutarLancamento(notaId, mapaSimples) {
  const nota=STATE.nfe.notas.find(n=>n.id===notaId);
  if(!nota) return;
  let tec=0,avi=0,zip=0;

  mapaSimples.forEach((m,i)=>{
    const qtd=Number(m.qtd)||0;
    const selEl=document.getElementById('nfe-dest-'+i);
    const destId=selEl?selEl.value:'__novo__';

    if(m.destino==='tecido'){
      if(destId==='__novo__'){
        STATE.estoque.tecidos.push({id:Date.now()+Math.random(),nome:m.nome,metros:qtd,valor:m.itemValUnit||0,minimo:200});
      } else {
        const t=STATE.estoque.tecidos.find(x=>String(x.id)===String(destId));
        if(t){t.metros=(t.metros||0)+qtd;}
      }
      tec++;
    } else if(m.destino==='ziper'){
      const tam=m.matchTam||15; const cor=m.matchCor||'escuro';
      const zp=STATE.estoque.zipers.find(z=>z.tam===tam);
      if(zp){zp[cor]=(zp[cor]||0)+qtd;}
      else{const nz={tam,escuro:0,branco:0};nz[cor]=qtd;STATE.estoque.zipers.push(nz);}
      zip++;
    } else {
      if(destId==='__novo__'){
        const minMap={botao:500,etiqueta:1000};
        STATE.estoque.aviamentos.push({id:Date.now()+Math.random(),nome:m.nome,estoque:qtd,minimo:minMap[m.itemCategMin]||200});
      } else {
        const a=STATE.estoque.aviamentos.find(x=>String(x.id)===String(destId));
        if(a){a.estoque=(a.estoque||0)+qtd;}
      }
      avi++;
    }
  });

  nota.lancadoEstoque=true; nota.dataLancamento=today();
  const partes=[];
  if(tec) partes.push(tec+' tecido(s)');
  if(avi) partes.push(avi+' aviamento(s)');
  if(zip) partes.push(zip+' zíper(s)');
  closeModal();
  showToast('✓ Estoque atualizado: '+partes.join(', ')+'!');
  renderNFe(); renderSidebarStats();
}

    <input class="inp" type="number" step="0.01" id="nfe-i-vunit-${idx}" placeholder="V.Unit" style="font-size:12px;padding:7px 6px;text-align:right"/>
    <input class="inp" type="number" step="0.01" id="nfe-i-vtot-${idx}" placeholder="V.Total" style="font-size:12px;padding:7px 6px;text-align:right"/>
    <button onclick="document.getElementById('nfe-item-${idx}').remove()" style="background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:5px;cursor:pointer">${icon('x',12,'#EF4444')}</button>`;
  lista.appendChild(div);
}

function nfeSalvarManual() {
  const forn = document.getElementById('nfe-m-forn')?.value.trim();
  if(!forn){ showToast('Informe o fornecedor.','error'); return; }
  const num  = document.getElementById('nfe-m-num')?.value.trim() || ('M-'+Date.now());
  const data = document.getElementById('nfe-m-data')?.value || today();

  const itens = [];
  document.querySelectorAll('[id^="nfe-item-"]').forEach(div=>{
    const idx = div.id.split('-')[2];
    const nome = document.getElementById(`nfe-i-nome-${idx}`)?.value.trim();
    if(!nome) return;
    const qtd  = parseFloat(document.getElementById(`nfe-i-qtd-${idx}`)?.value)||0;
    const unid = document.getElementById(`nfe-i-unid-${idx}`)?.value||'UN';
    const cat  = document.getElementById(`nfe-i-cat-${idx}`)?.value||'outros';
    const vunit= parseFloat(document.getElementById(`nfe-i-vunit-${idx}`)?.value)||0;
    const vtot = parseFloat(document.getElementById(`nfe-i-vtot-${idx}`)?.value)||(qtd*vunit);
    itens.push({nome, qtd, unid, categoria:cat, valorUnit:vunit, valorTotal:vtot, obs:''});
  });

  if(itens.length===0){ showToast('Adicione pelo menos um item.','error'); return; }

  const nota = {
    id: 'nfe_'+Date.now(),
    numero: num, data, fornecedor: forn, cnpj: '',
    valor: itens.reduce((a,i)=>a+i.valorTotal,0),
    itens, lancadoEstoque: false,
    origem: 'manual',
  };
  STATE.nfe.notas.unshift(nota);
  _nfeItemCount = 0;
  showToast(`Nota de ${forn} salva! ${itens.length} item(ns).`);
  closeModal(); renderNFe();
}

</script>

<script>
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // SW inline via Blob — funciona sem arquivo externo
    const swCode = `
const CACHE_NAME = 'nlj-producao-v2';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(self.clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(response => {
        if (response && response.status === 200 && response.type === 'basic') {
          const clone = response.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
        }
        return response;
      }).catch(() => cached);
    })
  );
});
self.addEventListener('message', e => {
  if(e.data && e.data.type === 'SKIP_WAITING') self.skipWaiting();
});
`;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl)
      .then(r => console.log('SW registrado (inline):', r.scope))
      .catch(e => console.log('SW info:', e));
  });
}

// Banner de instalação PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Mostrar botão de instalação após login
  setTimeout(() => {
    const btn = document.getElementById('btn-instalar-app');
    if(btn) btn.style.display = 'flex';
  }, 3000);
});
window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('btn-instalar-app');
  if(btn) btn.style.display = 'none';
  showToast('App instalado com sucesso! 🎉');
});
function instalarApp() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      if(choice.outcome === 'accepted') showToast('Instalando app...', 'success');
      deferredPrompt = null;
    });
  }
}
</script>
