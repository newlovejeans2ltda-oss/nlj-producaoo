<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD-A2gSeBKxY9kCy5ReeLkMbQDndAI9zMY",
    authDomain: "nlj-producao.firebaseapp.com",
    databaseURL: "https://nlj-producao-default-rtdb.firebaseio.com",
    projectId: "nlj-producao",
    storageBucket: "nlj-producao.firebasestorage.app",
    messagingSenderId: "876244519962",
    appId: "1:876244519962:web:ab4a9852a75a6eec3255a3"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  window._db = db;
  window._dbRef = ref;
  window._dbSet = set;
  window._dbUpdate = update;
  window._dbRemove = remove;
  window._dbOnValue = onValue;
  window._firebaseReady = true;

  // ── Sincronização em tempo real ──
  // Escuta mudanças no Firebase e atualiza STATE automaticamente
  function escutarFirebase() {
    onValue(ref(db, 'dados'), (snapshot) => {
      const dados = snapshot.val();
      if (!dados) return;
      let mudou = false;
      if (dados.ops)     { const v=toArr(dados.ops);     if(JSON.stringify(v)!==JSON.stringify(STATE.ops))     { STATE.ops=v;     mudou=true; } }
      if (dados.profs)   { const v=toArr(dados.profs);   if(JSON.stringify(v)!==JSON.stringify(STATE.profs))   { STATE.profs=v;   mudou=true; } }
      if (dados.modelos) { const v=toArr(dados.modelos); if(JSON.stringify(v)!==JSON.stringify(STATE.modelos)) { STATE.modelos=v; mudou=true; } }
      if (dados.estoque) { const e={...dados.estoque,tecidos:toArr(dados.estoque.tecidos),aviamentos:toArr(dados.estoque.aviamentos),zipers:toArr(dados.estoque.zipers)}; if(JSON.stringify(e)!==JSON.stringify(STATE.estoque)){ STATE.estoque=e; mudou=true; } }
      if (dados.fin)     { const f={...dados.fin,pagamentos:toArr(dados.fin?.pagamentos)}; if(JSON.stringify(f)!==JSON.stringify(STATE.fin)){ STATE.fin=f; mudou=true; } }
      if (dados.banco)   { const b={...dados.banco,lancamentos:toArr(dados.banco?.lancamentos),contas:toArr(dados.banco?.contas)}; if(JSON.stringify(b)!==JSON.stringify(STATE.banco)){ STATE.banco=b; mudou=true; } }
      if (mudou && STATE.logado) {
        // Re-renderiza a página atual silenciosamente
        try {
          const renders = {ops:renderOPs,profissionais:renderProfissionais,estoque:renderEstoque,financeiro:renderFinanceiro,modelos:renderModelos,banco:renderBanco,dashboard:renderDashboard};
          if (renders[STATE.page]) renders[STATE.page]();
          renderSidebarStats();
        } catch(e) {}
      }
    });
  }

  // Salva todo o STATE no Firebase
  window.fbSalvar = function(chave) {
    if (!window._firebaseReady) return;
    const payload = {};
    payload[chave] = STATE[chave];
    update(ref(db, 'dados'), payload).catch(e => console.warn('Firebase save error:', e));
  };

  // Normaliza arrays vindos do Firebase (podem chegar como objetos indexados)
  function toArr(v) {
    if (!v) return [];
    if (Array.isArray(v)) return v.filter(x => x != null);
    return Object.values(v).filter(x => x != null);
  }

  // Carrega dados do Firebase ao fazer login
  window.fbCarregar = function(cb) {
    if (!window._firebaseReady) { cb && cb(); return; }
    const r = ref(db, 'dados');
    onValue(r, (snapshot) => {
      const dados = snapshot.val();
      if (dados) {
        if (dados.ops)     STATE.ops     = toArr(dados.ops);
        if (dados.profs)   STATE.profs   = toArr(dados.profs);
        if (dados.estoque) {
          STATE.estoque = dados.estoque;
          if (dados.estoque.tecidos)    STATE.estoque.tecidos    = toArr(dados.estoque.tecidos);
          if (dados.estoque.aviamentos) STATE.estoque.aviamentos = toArr(dados.estoque.aviamentos);
          if (dados.estoque.zipers)     STATE.estoque.zipers     = toArr(dados.estoque.zipers);
        }
        if (dados.fin) {
          STATE.fin = dados.fin;
          if (dados.fin.pagamentos) STATE.fin.pagamentos = toArr(dados.fin.pagamentos);
        }
        if (dados.modelos) STATE.modelos = toArr(dados.modelos);
        if (dados.banco) {
          STATE.banco = dados.banco;
          if (dados.banco.lancamentos) STATE.banco.lancamentos = toArr(dados.banco.lancamentos);
          if (dados.banco.contas)      STATE.banco.contas      = toArr(dados.banco.contas);
        }
      } else {
        // Primeira vez: sobe os dados iniciais para o Firebase
        update(ref(db, 'dados'), {
          ops: STATE.ops, profs: STATE.profs, estoque: STATE.estoque,
          fin: STATE.fin, modelos: STATE.modelos, banco: STATE.banco
        });
      }
      cb && cb();
      escutarFirebase();
    }, { onlyOnce: true });
  };
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F2EBE0;--bgcard:#FFFCF7;--border:#D9CFBF;
  --sb:#3A3D42;--sb2:#2E3035;--sbb:#454850;
  --t1:#120E09;--t2:#5C4D3A;--t3:#8C7A62;
  --amber:#F59E0B;--blue:#2563EB;--green:#059669;
  --purple:#9333EA;--cyan:#0891B2;--orange:#EA580C;--red:#EF4444;
}
body{font-family:'Barlow',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);height:100vh;overflow:hidden;display:flex;}
#app-shell{display:none;flex-direction:row;width:100%;height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#C8B89A;border-radius:3px;}
input::placeholder{color:#A8967E;}
select option{background:#fff;color:#1A1612;}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SIDEBAR ── */
#sidebar{width:218px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;box-shadow:3px 0 14px rgba(0,0,0,.18);height:100vh;}
#sidebar .logo{padding:22px 18px 18px;border-bottom:1px solid var(--sbb);display:flex;align-items:center;gap:11px;}
#sidebar .logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#F59E0B,#F97316);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 10px rgba(245,158,11,.45);font-size:20px;}
#sidebar .logo-text .title{color:#F4EFE6;font-weight:800;font-size:15px;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;letter-spacing:.5px;line-height:1;}
#sidebar .logo-text .sub{color:#7A7D82;font-size:10px;font-family:monospace;margin-top:2px;}
#sidebar nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:9px;border:none;cursor:pointer;background:transparent;color:#7A7D82;font-size:13px;font-weight:500;font-family:'Barlow',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;transition:all .15s;text-align:left;border-left:3px solid transparent;}
.nav-btn:hover{background:var(--sb2);color:#C0C3C8;}
.nav-btn.active{font-weight:700;border-left:3px solid var(--nav-color)!important;background:color-mix(in srgb,var(--nav-color) 13%,transparent);color:var(--nav-color)!important;}
.nav-icon{border-radius:7px;padding:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.nav-btn.active .nav-icon{background:color-mix(in srgb,var(--nav-color) 13%,transparent);}
#sidebar .stats{padding:14px 14px 16px;border-top:1px solid var(--sbb);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-cell{background:var(--sb2);border-radius:8px;padding:8px 10px;text-align:center;}
.stat-val{font-size:16px;font-weight:800;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;line-height:1;}
.stat-lbl{color:#5A5D62;font-size:9px;font-family:monospace;margin-top:2px;}
#btn-logout{width:100%;background:transparent;border:1px solid var(--sbb);color:#5A5D62;border-radius:8px;padding:8px;font-size:11px;cursor:pointer;font-family:monospace;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
#btn-logout:hover{border-color:#EF4444;color:#EF4444;}
#badge-alert{background:#EF4444;color:#fff;border-radius:20px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}

/* ── MAIN ── */
#main{flex:1;overflow:auto;height:100vh;}
.page{padding:26px 30px;max-width:1400px;display:none;}
.page.active{display:block;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#2E3035 0%,#3A3D42 40%,#2A2D30 100%);display:flex;align-items:center;justify-content:center;z-index:500;}
#login-screen .grid-bg{position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,#fff 40px,#fff 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,#fff 40px,#fff 41px);}
#login-screen .glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.login-box{background:rgba(253,250,245,.97);border-radius:20px;padding:44px 48px;width:400px;box-shadow:0 32px 80px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);position:relative;z-index:1;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#F59E0B,#F97316);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 24px rgba(245,158,11,.4);font-size:26px;}
.login-title{color:var(--t1);font-size:22px;font-weight:800;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;letter-spacing:.5px;}
.login-sub{color:var(--t3);font-size:12px;font-family:monospace;margin-top:3px;}

/* ── CARDS / KPIs ── */
.card{background:var(--bgcard);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);background:#F5EFE3;display:flex;justify-content:space-between;align-items:center;}
.card-header .ch-sub{color:var(--t3);font-size:10px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px;}
.card-header .ch-title{color:var(--t1);font-weight:800;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:19px;}
.kpi{background:var(--bgcard);border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;border-top:3px solid var(--kpi-color);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.kpi-title{color:var(--t3);font-size:11px;font-weight:600;letter-spacing:.8px;margin-bottom:7px;text-transform:uppercase;font-family:monospace;}
.kpi-value{color:var(--t1);font-size:30px;font-weight:800;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;line-height:1.1;}
.kpi-sub{font-size:11px;margin-top:5px;font-family:monospace;}
.kpi-icon{background:color-mix(in srgb,var(--kpi-color) 9%,transparent);border-radius:10px;padding:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.kpi-delta{margin-top:10px;display:flex;align-items:center;gap:4px;}

/* ── BADGE / STATUS ── */
.badge{border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.5px;font-family:monospace;white-space:nowrap;padding:4px 12px;border:1.5px solid;}
.badge-corte     {background:#DBEAFE;color:#2563EB;border-color:#93C5FD;box-shadow:0 1px 4px #2563EB30;}
.badge-costura   {background:#FEF3C7;color:#D97706;border-color:#FCD34D;box-shadow:0 1px 4px #D9770630;}
.badge-travete   {background:#EDE9FE;color:#9333EA;border-color:#C4B5FD;box-shadow:0 1px 4px #9333EA30;}
.badge-lavanderia{background:#CFFAFE;color:#0891B2;border-color:#67E8F9;box-shadow:0 1px 4px #0891B230;}
.badge-acabamento{background:#FFEDD5;color:#EA580C;border-color:#FDBA74;box-shadow:0 1px 4px #EA580C30;}
.badge-finalizada{background:#D1FAE5;color:#059669;border-color:#6EE7B7;box-shadow:0 1px 4px #05966930;}

/* ── FORM ── */
.field{margin-bottom:16px;}
.field-label{color:var(--t2);font-size:12px;font-weight:600;margin-bottom:6px;font-family:monospace;display:block;}
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t1);outline:none;font-family:monospace;box-sizing:border-box;}
.inp:focus{border-color:#F59E0B;box-shadow:0 0 0 3px rgba(245,158,11,.12);}
select.inp{cursor:pointer;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:monospace;letter-spacing:.3px;transition:all .15s;border:none;}
.btn-primary{background:var(--t1);color:var(--bg);border:1px solid var(--t1);}
.btn-primary:hover{opacity:.88;}
.btn-outline{background:transparent;color:var(--t2);border:1px solid var(--border);}
.btn-outline:hover{background:var(--bg);}
.btn-danger{background:#FEF2F2;color:#EF4444;border:1px solid #FECACA;}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-sm svg{width:13px;height:13px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.modal-box{background:var(--bgcard);border:1px solid var(--border);border-radius:16px;width:520px;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}

.modal-header .title{color:var(--t1);font-size:17px;font-weight:700;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;}
.modal-body{padding:22px;}

/* ── TABLE ── */
.tbl-header{display:grid;padding:11px 18px 11px 17px;border-bottom:1px solid var(--border);background:#EDE3D5;}
.tbl-header span{color:var(--t2);font-size:11px;font-family:monospace;font-weight:800;letter-spacing:.8px;text-transform:uppercase;}
.tbl-row{display:grid;padding:13px 18px 13px 14px;border-bottom:1px solid var(--border);transition:all .12s;cursor:pointer;align-items:center;}
.tbl-row:last-child{border-bottom:none;}
.tbl-row:hover{background:#EDE3D5!important;}
.tbl-row:nth-child(odd){background:var(--bgcard);}
.tbl-row:nth-child(even){background:#FAF5EE;}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;right:28px;border-radius:12px;padding:13px 22px;font-size:13px;font-weight:700;font-family:monospace;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;display:none;align-items:center;gap:9px;animation:slideIn .25s ease;color:#fff;}
#toast.show{display:flex;}
#toast.success{background:#10B981;}
#toast.error{background:#EF4444;}

/* ── MISC HELPERS ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.flex-sb{display:flex;justify-content:space-between;align-items:center;}
.mono{font-family:monospace;}
.tag-ativo{background:#ECFDF5;color:#10B981;font-size:10px;font-family:monospace;padding:2px 8px;border-radius:20px;}
.tag-inativo{background:#FEF2F2;color:#EF4444;font-size:10px;font-family:monospace;padding:2px 8px;border-radius:20px;}

.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:10px 4px;}
.pag-btns{display:flex;gap:6px;align-items:center;}
.pag-btn{background:transparent;color:var(--t2);border:1px solid var(--border);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:monospace;font-weight:700;}
.pag-btn:hover:not(:disabled){background:var(--t1);color:var(--bg);border-color:var(--t1);}
.pag-btn:disabled{opacity:.4;cursor:default;}
.pag-btn.active{background:#D97706;color:#fff;border-color:#D97706;}
.pag-info{color:var(--t3);font-size:12px;font-family:monospace;}

/* ── STATUS FLOW DOTS ── */
.flow{display:flex;align-items:center;}
.flow-dot{width:9px;height:9px;border-radius:50%;border:2px solid;}
.flow-line{width:12px;height:2px;background:#E8DFD2;}

/* ─── ESTOQUE BARS ── */
.est-bar{background:var(--border);border-radius:5px;height:7px;overflow:hidden;margin-bottom:3px;}
.est-bar .fill{height:100%;border-radius:5px;transition:width .5s;}

/* ── RESPONSIVENESS ── */
@media(max-width:900px){
  #sidebar{width:60px;}
  #sidebar .logo-text,.nav-btn span,.stat-grid,.btn-logout span{display:none;}
}
</style>

function _detectarCategoria(nomeProduto) {
  const n = nomeProduto.toLowerCase();
  for(const cat of NFE_CATEGORIAS) {
    if(cat.match.some(m => n.includes(m))) return cat.key;
  }
  return 'outros';
}

function badge(status) {
  const m = SM[status]||SM.corte;
  return `<span class="badge ${m.cls}">● ${m.label}</span>`;
}

function flowDots(status) {
  const idx = STEPS.indexOf(status);
  let html = '<div class="flow">';
  STEPS.forEach((s,i)=>{
    const done=i<idx, active=i===idx, m=SM[s];
    const col = done?'#10B981':active?m.c:'#D4C9BA';
    html += `<div class="flow-dot" style="background:${col};border-color:${col}"></div>`;
    if(i<5) html += `<div class="flow-line" style="background:${done?'#10B98144':'#E8DFD2'}"></div>`;
  });
  return html+'</div>';
}

function btnHtml(label, onclick, {variant='primary',icn='',sm=false,danger=false}={}) {
  const cls = danger?'btn-danger':`btn-${variant}`;
  return `<button class="btn ${cls}${sm?' btn-sm':''}" onclick="${onclick}">${icn?icon(icn,sm?13:15)+' ':''}${label}</button>`;
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type==='success'?'✓ ':'✕ ') + msg;
  t.className = `show ${type}`;
  clearTimeout(t._tmr);
  t._tmr = setTimeout(()=>t.className='',2800);
}

function initApp() {
  renderNav();
  renderSidebarStats();
  navigateTo('dashboard');
}

function renderNav() {
  const alertas = calcAlertas();
  document.getElementById('nav-list').innerHTML = NAV.map(item=>`
    <button class="nav-btn${STATE.page===item.id?' active':''}" id="nav-${item.id}"
      style="--nav-color:${item.color}" onclick="navigateTo('${item.id}')">
      <div class="nav-icon">${icon(item.icon,15,STATE.page===item.id?item.color:'#7A7D82')}</div>
      <span style="flex:1;font-size:13px">${item.label}</span>
      ${item.id==='estoque'&&alertas>0?`<div id="badge-alert">${alertas}</div>`:''}
    </button>`).join('');
}

function navigateTo(pageId) {
  STATE.page = pageId;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pageId).classList.add('active');
  document.getElementById('main').scrollTop = 0;
  renderNav();
  renderSidebarStats();
  const renders = {
    dashboard:    renderDashboard,
    ops:          renderOPs,
    profissionais:renderProfissionais,
    estoque:      renderEstoque,
    financeiro:   renderFinanceiro,
    nfe:          renderNFe,
    modelos:      renderModelos,
    banco:        renderBanco,
  };
  (renders[pageId]||renderDashboard)();
}

function calcAlertas() {
  return STATE.estoque.tecidos.filter(t=>t.metros<t.minimo).length +
         STATE.estoque.aviamentos.filter(a=>a.estoque<a.minimo).length;
}

function renderSidebarStats() {
  const ops   = STATE.ops;
  const profs = STATE.profs;
  const alertas = calcAlertas();
  const totalPcs = ops.reduce((a,o)=>a+o.pecas,0);
  const stats = [
    {label:'OPs',    val:String(ops.length),                   color:'#F59E0B'},
    {label:'Profs',  val:String(profs.filter(p=>p.ativo).length), color:'#10B981'},
    {label:'Peças',  val:totalPcs>999?Math.round(totalPcs/1000)+'k':String(totalPcs), color:'#3B82F6'},
    {label:'Alertas',val:String(alertas), color:alertas>0?'#EF4444':'#10B981'},
  ];
  document.getElementById('sidebar-stats').innerHTML = stats.map(s=>`
    <div class="stat-cell">
      <div class="stat-val" style="color:${s.color}">${s.val}</div>
      <div class="stat-lbl">${s.label}</div>
    </div>`).join('');
}

let opState = {search:'',filter:'todos',sort:'novo',page:1,selectedOp:null};
const POR_PAG = 50;

function renderOPs() {
  if(opState.selectedOp) { renderOPDetail(); return; }
  const ops = STATE.ops;
  const filtered = ops.filter(o=>{
    const ms = o.op.toLowerCase().includes(opState.search.toLowerCase()) ||
               o.modelo.toLowerCase().includes(opState.search.toLowerCase());
    const mf = opState.filter==='todos' || o.status===opState.filter;
    return ms && mf;
  });
  // Sort by OP number
  const sorted = [...filtered].sort((a,b)=>{
    const na=Number(a.op.replace(/\D/g,'')), nb=Number(b.op.replace(/\D/g,''));
    return opState.sort==='novo' ? nb-na : na-nb;
  });
  const totalPag = Math.ceil(sorted.length/POR_PAG);
  const p = Math.min(opState.page, totalPag||1);
  opState.page = p;
  const paginado = sorted.slice((p-1)*POR_PAG, p*POR_PAG);
  const emAndamento = ops.filter(o=>o.status!=='finalizada').length;
  const finalizadas  = ops.filter(o=>o.status==='finalizada').length;

  const el = document.getElementById('page-ops');
  el.innerHTML = `
  <div style="padding:26px 30px;max-width:1400px">
    <div class="flex-sb" style="margin-bottom:24px">
      <div>
        <div style="color:var(--t3);font-size:10px;font-family:monospace;letter-spacing:2px;margin-bottom:3px">CONTROLE</div>
        <h1 style="color:var(--t1);font-size:34px;font-weight:800;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;letter-spacing:.5px">ORDENS DE PRODUÇÃO</h1>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="display:flex;background:var(--bgcard);border:1px solid var(--border);border-radius:9px;overflow:hidden">
          <button onclick="opState.sort='novo';opState.page=1;renderOPs()"
            style="padding:8px 14px;font-size:11px;font-family:monospace;font-weight:700;border:none;cursor:pointer;transition:all .15s;background:${opState.sort==='novo'?'var(--t1)':'transparent'};color:${opState.sort==='novo'?'var(--bg)':'var(--t3)'}">
            ↓ MAIS NOVO</button>
          <button onclick="opState.sort='antigo';opState.page=1;renderOPs()"
            style="padding:8px 14px;font-size:11px;font-family:monospace;font-weight:700;border:none;border-left:1px solid var(--border);cursor:pointer;transition:all .15s;background:${opState.sort==='antigo'?'var(--t1)':'transparent'};color:${opState.sort==='antigo'?'var(--bg)':'var(--t3)'}">
            ↑ MAIS ANTIGO</button>
        </div>
        <button class="btn btn-primary" onclick="openNewOP()">${icon('plus',15)} NOVA OP</button>
      </div>
    </div>

    <div style="display:flex;gap:12px;margin-bottom:14px">
      <div style="flex:1;display:flex;align-items:center;gap:9px;background:var(--bgcard);border:1px solid var(--border);border-radius:9px;padding:0 13px">
        ${icon('search',15,'#8C7A62')}
        <input id="ops-search" value="${esc(opState.search)}" placeholder="Buscar OP ou modelo..."
          oninput="opState.search=this.value;opState.page=1;renderOPs()"
          style="flex:1;background:transparent;border:none;color:var(--t1);font-size:13px;outline:none;padding:10px 0;font-family:monospace"/>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${['todos',...STEPS].map(s=>{
          const active=opState.filter===s, m=SM[s];
          return `<button onclick="opState.filter='${s}';opState.page=1;renderOPs()"
            style="background:${active?(s==='todos'?'var(--t1)':m.bg):'transparent'};color:${active?(s==='todos'?'var(--bg)':m.c):'var(--t3)'};border:1px solid ${active?(s==='todos'?'var(--t1)':m.bd):'var(--border)'};border-radius:8px;padding:8px 14px;font-size:11px;cursor:pointer;font-family:monospace;font-weight:700;letter-spacing:.5px">
            ${s==='todos'?'TODOS':m.label.toUpperCase()}</button>`;
        }).join('')}
      </div>
    </div>

    <div style="color:var(--t2);font-size:13px;font-family:monospace;font-weight:600;margin-bottom:10px">
      ${sorted.length} ordens encontradas &nbsp;·&nbsp;
      <span style="color:#EA580C;font-weight:700">${emAndamento} em andamento</span> &nbsp;·&nbsp;
      <span style="color:#059669;font-weight:700">${finalizadas} finalizadas</span>
    </div>

    <div class="card">
      <div class="tbl-header" style="grid-template-columns:90px 1fr 80px 100px 1fr 150px 120px">
        ${['OP','MODELO','PEÇAS','DATA','PROGRESSO','STATUS','AÇÕES'].map(h=>`<span>${h}</span>`).join('')}
      </div>
      ${paginado.length===0?`<div style="padding:32px;text-align:center;color:var(--t3);font-family:monospace;font-size:13px">Nenhuma OP encontrada.</div>`:''}
      ${paginado.map(op=>`
        <div class="tbl-row" style="grid-template-columns:90px 1fr 80px 100px 1fr 150px 120px;border-left:3px solid ${SM[op.status]?.c||'#ccc'}"
          onclick="opState.selectedOp='${esc(op.op)}';renderOPs()">
          <span style="font-family:monospace;color:#B45309;font-weight:800;font-size:14px;letter-spacing:.3px">${op.op}</span>
          <span style="color:var(--t1);font-size:14px;font-weight:600">${esc(op.modelo)}</span>
          <span style="font-family:monospace;color:var(--t1);font-size:13px;font-weight:700">${fmtN(op.pecas)}</span>
          <span style="font-family:monospace;color:var(--t3);font-size:12px">${fmtDate(op.data)}</span>
          <div style="display:flex;align-items:center">${flowDots(op.status)}</div>
          <div onclick="event.stopPropagation()">${badge(op.status)}</div>
          <div style="display:flex;gap:5px" onclick="event.stopPropagation()">
            <button onclick="openEditOP('${esc(op.op)}')" title="Editar" style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;padding:4px 7px;cursor:pointer">${icon('edit',13,'#3B82F6')}</button>
            <button onclick="printOP('${esc(op.op)}')" title="Imprimir OP" style="background:#F5F3FF;border:1px solid #C4B5FD;border-radius:6px;padding:4px 7px;cursor:pointer">${icon('printer',13,'#7C3AED')}</button>
            <button onclick="deleteOP('${esc(op.op)}')" title="Excluir" style="background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:4px 7px;cursor:pointer">${icon('trash',13,'#EF4444')}</button>
          </div>
        </div>`).join('')}
    </div>

    ${totalPag>1?`
    <div class="pagination">
      <span class="pag-info">Página ${p} de ${totalPag} · ${sorted.length} OPs no total</span>
      <div class="pag-btns">
        <button class="pag-btn" onclick="opState.page=1;renderOPs()" ${p===1?'disabled':''}>«</button>
        <button class="pag-btn" onclick="opState.page=Math.max(1,opState.page-1);renderOPs()" ${p===1?'disabled':''}>‹ ANT</button>
        ${Array.from({length:Math.min(5,totalPag)},(_,i)=>{
          let pg;
          if(totalPag<=5) pg=i+1;
          else if(p<=3) pg=i+1;
          else if(p>=totalPag-2) pg=totalPag-4+i;
          else pg=p-2+i;
          return `<button class="pag-btn${pg===p?' active':''}" onclick="opState.page=${pg};renderOPs()">${pg}</button>`;
        }).join('')}
        <button class="pag-btn" onclick="opState.page=Math.min(${totalPag},opState.page+1);renderOPs()" ${p===totalPag?'disabled':''}>PRÓ ›</button>
        <button class="pag-btn" onclick="opState.page=${totalPag};renderOPs()" ${p===totalPag?'disabled':''}>»</button>
      </div>
    </div>`:'' }
  </div>`;
}

function renderOPDetail() {

  const statusIdx = STEPS.indexOf(op.status);
  const canAdvance = op.status!=='finalizada';
  const nextStatus = STEPS[statusIdx+1];

  const steps=[
    {key:'corte',     label:'Corte',     icn:'scissors',  entrada:op.pecas,                           saida:op.pecas,   val:op.pecas*5},
    {key:'costura',   label:'Costura',   icn:'sewing',    entrada:op.costura_ent??op.costura,         saida:op.costura, val:op.costura?op.costura*7:null},
    {key:'travete',   label:'Travete',   icn:'shirt',     entrada:op.travete_ent??op.travete,         saida:op.travete, val:op.travete?op.travete*0.7:null},
    {key:'lavanderia',label:'Lavanderia',icn:'box',       entrada:op.lav_ent??op.lav,                 saida:op.lav,     val:op.lav?op.lav*3.5:null},
    {key:'acabamento',label:'Acabamento',icn:'finish',    entrada:op.acb_ent??op.acb,                 saida:op.acb,     val:op.acb?op.acb*1.7:null},

  const custo = steps.reduce((a,s)=>a+(s.val||0),0);

      ${op.status==='finalizada'?`<span style="margin-left:auto;background:#ECFDF5;color:#10B981;border:1px solid #A7F3D0;border-radius:9px;padding:7px 14px;font-size:12px;font-weight:700;font-family:monospace">✓ OP FINALIZADA</span>`:''}
    </div>

    <div class="flex-sb" style="margin-bottom:22px">
      <div>
        <div style="font-family:monospace;color:#D97706;font-size:13px;margin-bottom:3px">${op.op}</div>
        <h1 style="color:var(--t1);font-size:28px;font-weight:800;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif">${esc(op.modelo)}</h1>
        <div style="color:var(--t2);font-size:12px;margin-top:4px;font-family:monospace">${fmtN(op.pecas)} peças${op.pares?` · ${fmtN(op.pares)} pares`:''} · ${esc(op.tecido)}${op.cortador?` · Cortador: ${esc(op.cortador)}`:''} · ${op.data}</div>

    <div class="grid3" style="margin-bottom:20px">
      <div class="kpi" style="--kpi-color:#3B82F6"><div class="flex-sb"><div>

        <div class="kpi-value">${fmtN(op.pecas)}</div>

            ${pend?`<span style="color:var(--t3);font-size:10px;font-family:monospace">AGUARDANDO</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function advanceOP(opCod) {
  const op = STATE.ops.find(o=>o.op===opCod);
  if(!op||op.status==='finalizada') return;
  const idx = STEPS.indexOf(op.status);
  const next = STEPS[idx+1];
  op.status = next;
  showToast(`Avançado para ${SM[next]?.label}!`);
  renderOPs();
  renderSidebarStats();
}

function buildOPForm(f, isEdit) {

    return `
    <div style="background:${color}08;border:1px solid ${color}22;border-radius:10px;padding:14px 16px;border-left:3px solid ${color}">

    <div class="field"><label class="field-label">TOTAL DE PEÇAS *</label><input class="inp" type="number" id="f-pecas" value="${f.pecas}" placeholder="0"></div>
    <div class="field"><label class="field-label">STATUS</label>

    <div class="field"><label class="field-label">PARES</label>

  </div>

function saveOP(isEdit) {
  const op=document.getElementById('f-op').value.trim();
  const modelo=document.getElementById('f-modelo').value.trim();
  const pecas=document.getElementById('f-pecas').value;
  if(!op||!modelo||!pecas){showToast('Preencha OP, Modelo e Peças.','error');return;}
  const get=id=>document.getElementById(id).value;
  const toN=v=>v?Number(v):null;
  const novo={
    op,data:get('f-data'),modelo:modelo.toUpperCase(),tecido:get('f-tecido').toUpperCase(),
    cortador:get('f-cortador').toUpperCase(),pecas:Number(pecas),status:get('f-status'),
    pares:toN(get('f-pares')),
    qtd_risco:toN(get('f-qtd_risco')),largura:toN(get('f-largura')),metros:toN(get('f-metros')),
    costureiro:get('f-costureiro').toUpperCase()||null,
    ziper15:toN(get('f-ziper15')),ziper18:toN(get('f-ziper18')),
    retalhos:get('f-retalhos')||null,
    costura_ent:toN(get('f-costura_ent')),costura:toN(get('f-costura')),
    travete_ent:toN(get('f-travete_ent')),travete:toN(get('f-travete')),
    lav_ent:toN(get('f-lav_ent')),lav:toN(get('f-lav')),
    acb_ent:toN(get('f-acb_ent')),acb:toN(get('f-acb')),
    prof_costura:   get('f-prof_costura')||null,
    prof_travete:   get('f-prof_travete')||null,
    prof_lavanderia:get('f-prof_lavanderia')||null,
    prof_acabamento:get('f-prof_acabamento')||null,
  };
  // Calcular e avisar divergências na hora de salvar
  const divs = [];
  const etapasChk = [
    {label:'Costura',   ent:'costura_ent',  sai:'costura',   prof:'prof_costura'},
    {label:'Travete',   ent:'travete_ent',  sai:'travete',   prof:'prof_travete'},
    {label:'Lavanderia',ent:'lav_ent',      sai:'lav',       prof:'prof_lavanderia'},
    {label:'Acabamento',ent:'acb_ent',      sai:'acb',       prof:'prof_acabamento'},
  ];
  etapasChk.forEach(e=>{
    const ent=toN(get('f-'+e.ent)), sai=toN(get('f-'+e.sai));
    if(ent&&sai&&ent!==sai) divs.push(`${e.label}: ${ent-sai>0?ent-sai+'pç faltando':Math.abs(ent-sai)+'pç a mais'}`);
  });
  if(divs.length>0) showToast('⚠ Divergência: '+divs.join(' | '),'error');
  if(isEdit){
    const idx=STATE.ops.findIndex(o=>o.op===op);
    if(idx>=0) STATE.ops[idx]=novo;
    showToast('OP atualizada com sucesso!');
  } else {
    if(STATE.ops.find(o=>o.op===op)){showToast('Código de OP já existe.','error');return;}
    STATE.ops.unshift(novo);
    showToast('Nova OP criada!');
  }
  if(window.fbSalvar) window.fbSalvar('ops');
  closeModal();
  renderOPs();
  renderSidebarStats();
}

function deleteOP(opCod) {
  if(!confirm(`Tem certeza que deseja remover ${opCod}?`)) return;
  STATE.ops = STATE.ops.filter(o=>o.op!==opCod);
  if(opState.selectedOp===opCod) opState.selectedOp=null;
  if(window.fbSalvar) window.fbSalvar('ops');
  showToast('OP removida.','error');
  renderOPs();
  renderSidebarStats();
}

    <button class="btn btn-primary" onclick="saveProf(${isEdit},${isEdit?f.id:'null'})">${icon('save',15)} ${isEdit?'SALVAR ALTERAÇÕES':'CADASTRAR'}</button>
  </div>`;
}

function saveProf(isEdit, id) {
  const nome = document.getElementById('pf-nome').value.trim().toUpperCase();
  if(!nome){showToast('Nome obrigatório.','error');return;}
  const toV=k=>Number(document.getElementById('pf-'+k).value)||0;
  const existing = isEdit ? STATE.profs.find(p=>p.id===id) : null;
  const novo={
    id: isEdit?id:(Math.max(...STATE.profs.map(p=>p.id),0)+1),
    nome,
    profissao:document.getElementById('pf-prof').value,
    ativo:document.getElementById('pf-ativo').value==='1',
    vals:{SAIA:toV('SAIA'),FEM:toV('FEM'),BR_MASC:toV('BR_MASC'),MASC:toV('MASC')},
    foto: existing ? existing.foto : null,
  };
  if(isEdit){
    const idx=STATE.profs.findIndex(p=>p.id===id);
    if(idx>=0) STATE.profs[idx]=novo;
    showToast('Profissional atualizado!');
  } else {
    STATE.profs.push(novo);
    showToast('Profissional cadastrado!');
  }
  if(window.fbSalvar) window.fbSalvar('profs');
  closeModal();
  renderProfissionais();
  renderSidebarStats();
}

function toggleAtivo(id) {
  const p=STATE.profs.find(x=>x.id===id);
  if(p) p.ativo=!p.ativo;
  if(window.fbSalvar) window.fbSalvar('profs');
  renderProfissionais();
  renderSidebarStats();
}

function deleteProf(id) {
  const p=STATE.profs.find(x=>x.id===id);
  if(!p||!confirm(`Tem certeza que deseja remover ${p.nome}?`)) return;
  STATE.profs=STATE.profs.filter(x=>x.id!==id);
  if(profState.selectedId===id) profState.selectedId=null;
  if(window.fbSalvar) window.fbSalvar('profs');
  showToast('Profissional removido.','error');
  renderProfissionais();
  renderSidebarStats();
}

function saveTecido() {
  const nome=document.getElementById('ef-nome').value.trim().toUpperCase();
  const metros=document.getElementById('ef-metros').value;
  if(!nome||!metros){showToast('Nome e metros são obrigatórios.','error');return;}
  const item={id:estState.target?.id||Date.now(),nome,metros:Number(metros),valor:Number(document.getElementById('ef-valor').value)||0,minimo:Number(document.getElementById('ef-minimo').value)||200};
  if(estState.target){STATE.estoque.tecidos=STATE.estoque.tecidos.map(t=>t.id===item.id?item:t);showToast('Tecido atualizado!');}
  else{STATE.estoque.tecidos.push(item);showToast('Tecido cadastrado!');}
  if(window.fbSalvar) window.fbSalvar('estoque');
  closeModal();renderEstoque();renderSidebarStats();

// ── Calcula o quanto cada profissional produziu em cada OP (entrada+saída)
function calcProdProf() {
  // Retorna lista de {prof, etapa, op, entrada, saida, valor_unit, valor_total, pago}
  const linhas = [];
  const pagamentos = STATE.fin.pagamentos;

  STATE.ops.forEach(op => {
    const etapasOp = [
      {etapa:'costura',   prof: op.costureiro||null, entrada: op.costura_ent??op.costura, saida: op.costura,  key:'costura'},
      {etapa:'travete',   prof: null,                 entrada: op.travete_ent??op.travete,saida: op.travete,  key:'travete'},
      {etapa:'lavanderia',prof: null,                 entrada: op.lav_ent??op.lav,        saida: op.lav,      key:'lavanderia'},
      {etapa:'acabamento',prof: null,                 entrada: op.acb_ent??op.acb,        saida: op.acb,      key:'acabamento'},
    ];
    etapasOp.forEach(e => {
      if(!e.saida && !e.entrada) return; // etapa sem registro
      linhas.push({
        op: op.op, modelo: op.modelo,
        etapa: e.etapa, etapaLabel: SM[e.etapa]?.label || e.etapa,
        etapaCor: SM[e.etapa]?.c || '#888',
        entrada: e.entrada, saida: e.saida,
      });
    });
  });
  return linhas;
}

// ── Calcula saldo devedor por profissional baseado nas OPs e taxa cadastrada
function calcSaldoProfissionais() {
  const resultado = [];

  const etapaMap = {
    'Costureiro': {key:'costura',    profField:'prof_costura',    saiField:'costura', entField:'costura_ent'},
    'Travete':    {key:'travete',    profField:'prof_travete',    saiField:'travete', entField:'travete_ent'},
    'Acabamento': {key:'acabamento', profField:'prof_acabamento', saiField:'acb',     entField:'acb_ent'},
    'Lavanderia': {key:'lavanderia', profField:'prof_lavanderia', saiField:'lav',     entField:'lav_ent'},
    'Cortador':   null,
  };

  STATE.profs.filter(p=>p.ativo).forEach(p => {
    const info = etapaMap[p.profissao];
    if(!info) return;

    let totalPecasSaida = 0;
    let totalDivergencia = 0; // peças faltando (entrada - saída quando entrada > saída)
    const opsComDivergencia = [];

    STATE.ops.forEach(op => {
      // Verifica se este profissional está vinculado à etapa desta OP
      const profVinculado = (op[info.profField]||'').toUpperCase();
      // Fallback: costureiro no campo legado
      const profLegado = info.key==='costura' ? (op.costureiro||'').toUpperCase() : '';
      const esteProf = p.nome.toUpperCase();

      const vinculado = profVinculado === esteProf || (profVinculado==='' && profLegado===esteProf);
      if(!vinculado) return;

      const saida   = Number(op[info.saiField])||0;
      const entrada = Number(op[info.entField])||saida; // se não tem entrada, assume = saída (sem divergência)

      totalPecasSaida += saida;

      // Divergência: entrada registrada e maior que saída
      if(entrada > 0 && saida > 0 && entrada > saida) {
        const faltando = entrada - saida;
        totalDivergencia += faltando;
        opsComDivergencia.push({op:op.op, modelo:op.modelo, entrada, saida, faltando});
      }
    });

    const taxa        = p.vals?.FEM || 0;
    const totalGerado = totalPecasSaida * taxa;
    const desconto    = totalDivergencia * taxa; // valor a descontar pelas peças faltando
    const totalPago   = STATE.fin.pagamentos.filter(pg=>pg.profissional===p.nome).reduce((s,pg)=>s+pg.valor,0);
    const saldoLiquido= totalGerado - desconto - totalPago;

    resultado.push({
      prof: p, taxa, totalPecas: totalPecasSaida, totalGerado,
      totalPago, totalDivergencia, desconto,
      saldo: saldoLiquido,
      opsComDivergencia,
      etapa: info.key, etapaLabel: SM[info.key]?.label || p.profissao,
      cor: SM[info.key]?.c || '#888',
    });
  });
  return resultado;
}

//  FECHAMENTO SEMANAL
// ══════════════════════════════════════════════════════════════
function semanaAtual() {
  const hoje = new Date();
  const diaSemana = hoje.getDay();
  const diffSeg = diaSemana === 0 ? -6 : 1 - diaSemana;
  const seg = new Date(hoje); seg.setDate(hoje.getDate() + diffSeg);
  const sex = new Date(seg);  sex.setDate(seg.getDate() + 4);
  const toISO = d => d.toISOString().slice(0,10);
  return {de: toISO(seg), ate: toISO(sex)};
}

function renderFechamento(pagamentos) {
  if(!finState.fechDe || !finState.fechAte) {
    const sw = semanaAtual();
    finState.fechDe  = finState.fechDe  || sw.de;
    finState.fechAte = finState.fechAte || sw.ate;
  }

  const etapasCfg = [
    {key:'costura',    profField:'prof_costura',    entField:'costura_ent', saiField:'costura'},
    {key:'travete',    profField:'prof_travete',    entField:'travete_ent', saiField:'travete'},
    {key:'lavanderia', profField:'prof_lavanderia', entField:'lav_ent',     saiField:'lav'},
    {key:'acabamento', profField:'prof_acabamento', entField:'acb_ent',     saiField:'acb'},
  ];

  // Todos profissionais: cadastrados ativos + vinculados nas OPs
  const profSet = new Set();
  // 1. Profissionais cadastrados ativos (exceto cortadores)
  STATE.profs.filter(p=>p.ativo && p.profissao!=='Cortador').forEach(p=>profSet.add(p.nome));
  // 2. Profissionais vinculados nas OPs (campos prof_* e legado costureiro)
  STATE.ops.forEach(op => {
    etapasCfg.forEach(cfg => {
      const n = (op[cfg.profField]||'').trim() || (cfg.key==='costura'?(op.costureiro||'').trim():'');
      if(n) profSet.add(n);
    });
  });
  const todosProfs = [...profSet].sort();

  // Default: primeiro profissional
  if(!finState.fechProf && todosProfs.length>0) finState.fechProf = todosProfs[0];

  // ── CALCULAR LINHAS DO PROFISSIONAL SELECIONADO NO PERÍODO ──
  const de  = finState.fechDe;
  const ate = finState.fechAte;
  const prof = finState.fechProf;

  let linhas = [];
  if(prof) {
    STATE.ops.forEach(op => {
      etapasCfg.forEach(cfg => {
        const profNome = (op[cfg.profField]||'').trim() || (cfg.key==='costura'?(op.costureiro||'').trim():'');
        if(profNome.toUpperCase() !== prof.toUpperCase()) return;

        // Filtro de período pela data da OP
        if(de && op.data < de) return;
        if(ate && op.data > ate) return;

        const saida   = Number(op[cfg.saiField])||0;
        // entrada real: se não preenchida fica null (não assumir = saída)
        const entRaw  = op[cfg.entField];
        const entrada = (entRaw!==null && entRaw!==undefined && entRaw!=='') ? Number(entRaw) : null;
        if(!saida && entrada===null) return;

        const profObj    = STATE.profs.find(p=>p.nome.toUpperCase()===prof.toUpperCase());
        const taxa       = profObj ? (profObj.vals?.FEM||0) : 0;
        // Faltando: só calcula se entrada foi preenchida e é maior que saída
        const faltando   = (entrada!==null && saida>0 && entrada>saida) ? entrada-saida : 0;
        const valorBruto = saida * taxa;
        // Desconto usa valor do modelo (preço da peça) se cadastrado, senão usa taxa do profissional
        const modeloObj  = STATE.modelos.find(m=>m.nome.toUpperCase()===op.modelo.toUpperCase());
        const valorPeca  = (modeloObj && modeloObj.valor>0) ? modeloObj.valor : null;
        const desconto   = valorPeca ? faltando * valorPeca : faltando * taxa;
        const valorLiq   = valorBruto - desconto;

        linhas.push({
          op: op.op, data: op.data, modelo: op.modelo,
          etapa: cfg.key, etapaLabel: SM[cfg.key].label, etapaCor: SM[cfg.key].c,
          entrada, saida, faltando, taxa, valorPeca, valorBruto, desconto, valorLiq,
          opNum: Number(op.op.replace(/\D/g,'')),
        });
      });
    });
  }
  linhas.sort((a,b)=>b.opNum-a.opNum);

  // Pagamentos no período para este profissional
  const pgtosPeriodo = pagamentos.filter(pg => {
    if(pg.profissional.toUpperCase() !== (prof||'').toUpperCase()) return false;
    if(de && pg.data < de) return false;
    if(ate && pg.data > ate) return false;
    return true;
  });

  // Totais
  const totalPecas    = linhas.reduce((a,l)=>a+l.saida,0);
  const totalFaltando = linhas.reduce((a,l)=>a+l.faltando,0);
  const totalBruto    = linhas.reduce((a,l)=>a+l.valorBruto,0);
  const totalDesconto = linhas.reduce((a,l)=>a+l.desconto,0);
  const totalLiquido  = totalBruto - totalDesconto;
  const totalPago     = pgtosPeriodo.reduce((a,p)=>a+p.valor,0);
  const totalVale     = pgtosPeriodo.filter(p=>p.metodo==='Vale').reduce((a,p)=>a+p.valor,0);
  const totalAdiant   = pgtosPeriodo.filter(p=>p.metodo==='Adiantamento').reduce((a,p)=>a+p.valor,0);
  const totalPix      = pgtosPeriodo.filter(p=>p.metodo==='PIX'||p.metodo==='Transferência').reduce((a,p)=>a+p.valor,0);
  const saldoFinal    = totalLiquido - totalPago;

  const fmtD  = d => { if(!d) return '—'; const p=d.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d; };
  const profObj = STATE.profs.find(p=>p.nome.toUpperCase()===(prof||'').toUpperCase());
  const pc = profObj ? (PC[profObj.profissao]||'#888') : '#888';

  // Semanas preset
  function gerarSemanas() {
    const semanas = [];
    const hoje = new Date();
    for(let i=0; i<8; i++) {
      const diaSemana = hoje.getDay();
      const diffSeg = diaSemana===0?-6:1-diaSemana;
      const seg = new Date(hoje); seg.setDate(hoje.getDate()+diffSeg-(i*7));
      const sex = new Date(seg);  sex.setDate(seg.getDate()+4);
      const toISO = d=>d.toISOString().slice(0,10);
      const fmtS = d=>{const p=d.toISOString().slice(0,10).split('-');return p[2]+'/'+p[1];};
      semanas.push({de:toISO(seg), ate:toISO(sex), label:`${fmtS(seg)} → ${fmtS(sex)}`+(i===0?' (esta semana)':i===1?' (semana passada)':'')});
    }
    return semanas;
  }
  const semanas = gerarSemanas();

  // ── AGRUPAMENTO POR ETAPA para o resumo ──
  const etapasResumo = etapasCfg.map(cfg=>{
    const ls = linhas.filter(l=>l.etapa===cfg.key);
    return {
      etapa: cfg.key, label: SM[cfg.key].label, cor: SM[cfg.key].c,
      pecas: ls.reduce((a,l)=>a+l.saida,0),
      faltando: ls.reduce((a,l)=>a+l.faltando,0),
      valor: ls.reduce((a,l)=>a+l.valorBruto,0),
      ops: ls.length,
    };
  }).filter(e=>e.pecas>0||e.faltando>0);

  const COLS = '78px 82px 1fr 96px 58px 58px 58px 58px 80px 110px';
  const HDRS = ['ORDEM','DT.SAÍDA','MODELO','ETAPA','ENTRADA','SAÍDA','FALTOU','TAXA','DESCONTO','VALOR'];

  return `
  <div style="display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start">

    <!-- COLUNA PRINCIPAL -->
    <div style="display:flex;flex-direction:column;gap:14px">

      <!-- FILTROS -->
      <div class="card">
        <div style="padding:14px 18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">

          <!-- PROFISSIONAL -->
          <div style="flex:1;min-width:220px">
            <div style="color:var(--t3);font-size:10px;font-family:monospace;letter-spacing:1px;margin-bottom:6px">PROFISSIONAL</div>
            ${todosProfs.length===0
              ? `<div style="color:#EF4444;font-size:12px;font-family:monospace;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 12px">Nenhum profissional ativo cadastrado.<br/><span style="font-size:10px;color:var(--t3)">Cadastre profissionais na aba Profissionais.</span></div>`
              : `<div style="display:flex;flex-direction:column;gap:8px">
                <!-- SELECT rápido -->
                <select style="width:100%;background:var(--bgcard);border:2px solid var(--amber);border-radius:9px;padding:9px 12px;font-size:13px;font-weight:700;color:var(--t1);font-family:monospace;outline:none;cursor:pointer"
                  onchange="finState.fechProf=this.value;renderFinanceiro()">
                  <option value="" ${!finState.fechProf?'selected':''}>— Selecionar profissional —</option>
                  ${todosProfs.map(p=>`<option value="${p}"${finState.fechProf===p?' selected':''}>${p}</option>`).join('')}
                </select>
                <!-- Botões rápidos -->
                <div style="display:flex;gap:5px;flex-wrap:wrap">
                  ${todosProfs.map(p=>{
                    const po=STATE.profs.find(x=>x.nome.toUpperCase()===p.toUpperCase());
                    const c=po?(PC[po.profissao]||'#888'):'#888';
                    const sel=finState.fechProf===p;
                    return `<button onclick="finState.fechProf='${p}';renderFinanceiro()" title="${p}"
                      style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:2px solid ${sel?c:'var(--border)'};background:${sel?c+'18':'transparent'};cursor:pointer;transition:all .15s;font-size:11px;font-weight:${sel?700:500};color:${sel?c:'var(--t2)'};font-family:monospace;white-space:nowrap">
                      <div style="width:18px;height:18px;border-radius:5px;background:${c}22;border:1.5px solid ${c}55;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:${c};flex-shrink:0">
                        ${po&&po.foto?`<img src="${po.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:4px"/>`:p[0]||'?'}
                      </div>
                      ${p.split(' ')[0]}
                    </button>`;
                  }).join('')}
                </div>
              </div>`
            }
          </div>

          <!-- PERÍODO -->
          <div style="min-width:200px">
            <div style="color:var(--t3);font-size:10px;font-family:monospace;letter-spacing:1px;margin-bottom:5px">PERÍODO</div>
            <select style="width:100%;background:var(--bgcard);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--t1);font-family:monospace;outline:none;cursor:pointer"
              onchange="const v=this.value.split('|');finState.fechDe=v[0];finState.fechAte=v[1];renderFinanceiro()">
              <option value="${finState.fechDe}|${finState.fechAte}">Período personalizado</option>
              ${semanas.map(s=>`<option value="${s.de}|${s.ate}" ${finState.fechDe===s.de&&finState.fechAte===s.ate?'selected':''}>${s.label}</option>`).join('')}
            </select>
            <div style="display:flex;gap:6px;margin-top:6px;align-items:center">
              <input type="date" value="${finState.fechDe}" onchange="finState.fechDe=this.value;renderFinanceiro()"
                style="flex:1;background:var(--bgcard);border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-size:11px;color:var(--t1);font-family:monospace;outline:none"/>
              <span style="color:var(--t3);font-size:11px">até</span>
              <input type="date" value="${finState.fechAte}" onchange="finState.fechAte=this.value;renderFinanceiro()"
                style="flex:1;background:var(--bgcard);border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-size:11px;color:var(--t1);font-family:monospace;outline:none"/>
            </div>
          </div>

          <!-- AÇÕES -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <button onclick="imprimirFechamento()"
              style="background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:monospace;white-space:nowrap;display:flex;align-items:center;gap:7px">
              ${icon('printer',14,'#fff')} IMPRIMIR / PDF
            </button>
            <button onclick="openPagamentoModal('${prof||''}','${profObj?SM[profObj?etapasCfg.find(e=>e.profField===('prof_'+(profObj.profissao||'').toLowerCase().replace('é','e')))?.key||'costura':'costura']?.label||'Costura':''}')"
              style="background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:monospace;white-space:nowrap;display:flex;align-items:center;gap:7px">
              ${icon('money',14,'#fff')} REGISTRAR PGTO
            </button>
          </div>
        </div>
      </div>

      ${!prof ? `<div style="padding:48px;text-align:center;color:var(--t3);font-family:monospace;background:var(--bgcard);border:1px solid var(--border);border-radius:14px">Selecione um profissional acima para ver o fechamento.</div>` : `

      <!-- KPIs SEMANA -->
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">
        ${[
          {t:'PEÇAS PRODUZIDAS', v:fmtN(totalPecas),    sub:etapasResumo.map(e=>e.label+': '+fmtN(e.pecas)).join(' · '),  c:'#3B82F6', icn:'sewing'},
          {t:'VALOR BRUTO',      v:'R$ '+fmt(totalBruto),sub:'Taxa R$ '+fmt(profObj?profObj.vals?.FEM||0:0)+'/pç',          c:'#F59E0B', icn:'trending'},
          {t:'DESCONTOS',        v:totalDesconto>0?'−R$ '+fmt(totalDesconto):'Nenhum', sub:totalFaltando>0?fmtN(totalFaltando)+' pç faltando':'Tudo OK ✓', c:totalDesconto>0?'#EF4444':'#10B981', icn:'alert'},
          {t:'TOTAL PAGO',       v:'R$ '+fmt(totalPago), sub:pgtosPeriodo.length+' pagamento(s) no período',               c:'#10B981', icn:'check'},
          {t:'SALDO A PAGAR',    v:'R$ '+fmt(Math.abs(saldoFinal)), sub:saldoFinal<=0?'✓ QUITADO':'pendente nesta semana', c:saldoFinal>0?'#EF4444':'#10B981', icn:'money'},
        ].map(k=>`
          <div class="kpi" style="--kpi-color:${k.c};padding:14px 16px">
            <div class="flex-sb">
              <div>
                <div class="kpi-title">${k.t}</div>
                <div style="font-size:20px;font-weight:800;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;color:${k.c};line-height:1.1;margin:4px 0">${k.v}</div>
                <div style="font-size:10px;color:var(--t3);font-family:monospace;margin-top:2px">${k.sub}</div>
              </div>
              <div class="kpi-icon">${icon(k.icn,18,k.c)}</div>
            </div>
          </div>`).join('')}
      </div>

      <!-- TABELA DE OPs -->
      <div class="card">
        <div class="card-header">
          <div>
            <div class="ch-sub">${linhas.length} ordens · ${fmtD(de)} a ${fmtD(ate)}</div>
            <div class="ch-title">OPs de ${esc(prof)} no período</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${totalFaltando>0?`<span style="background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:4px 12px;color:#EF4444;font-size:11px;font-family:monospace;font-weight:700">⚠ ${fmtN(totalFaltando)} peças faltando</span>`:'<span style="background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;padding:4px 12px;color:#10B981;font-size:11px;font-family:monospace;font-weight:700">✓ Sem divergências</span>'}
          </div>
        </div>

        <!-- Header -->
        <div style="display:grid;grid-template-columns:${COLS};padding:8px 16px;background:#F5EFE3;border-bottom:1px solid var(--border)">
          ${HDRS.map(h=>`<span style="color:var(--t3);font-size:10px;font-family:monospace;font-weight:700">${h}</span>`).join('')}
        </div>

        <!-- Linhas -->
        <div style="max-height:420px;overflow-y:auto">
        ${linhas.length===0
          ? `<div style="padding:32px;text-align:center;color:var(--t3);font-family:monospace">Nenhuma OP encontrada neste período.</div>`
          : linhas.map((l,i)=>`
            <div style="display:grid;grid-template-columns:${COLS};padding:10px 16px;border-bottom:1px solid var(--border);background:${l.faltando>0?'#FFFBFB':i%2===0?'var(--bgcard)':'#FAF7F0'};align-items:center;border-left:3px solid ${l.faltando>0?'#EF4444':l.etapaCor}">
              <span style="font-family:monospace;color:#B45309;font-weight:700;font-size:12px">${l.op}</span>
              <span style="font-family:monospace;color:var(--t3);font-size:11px">${fmtD(l.data)}</span>
              <span style="color:var(--t1);font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(l.modelo)}</span>
              <span style="background:${l.etapaCor}15;color:${l.etapaCor};border:1px solid ${l.etapaCor}30;border-radius:20px;padding:2px 7px;font-size:10px;font-family:monospace;font-weight:700">${l.etapaLabel}</span>
              <span style="font-family:monospace;font-size:13px;text-align:center;color:var(--t2)">${l.entrada!==null?fmtN(l.entrada):'—'}</span>
              <span style="font-family:monospace;font-size:13px;text-align:center;color:${l.saida>0?'var(--t1)':'var(--t3)'};font-weight:${l.saida>0?700:400}">${l.saida>0?fmtN(l.saida):'—'}</span>
              <span style="font-family:monospace;font-size:13px;text-align:center;font-weight:${l.faltando>0?700:400};color:${l.faltando>0?'#EF4444':'var(--t3)'}">
                ${l.faltando>0?'−'+fmtN(l.faltando):'✓'}
              </span>
              <span style="font-family:monospace;font-size:11px;text-align:right;color:var(--t3)">R$${fmt(l.taxa)}</span>
              <span style="font-family:monospace;font-size:12px;text-align:right;color:${l.desconto>0?'#EF4444':'var(--t3)'}">
                ${l.desconto>0?'−R$'+fmt(l.desconto):'—'}
                ${l.faltando>0&&l.valorPeca?`<div style="font-size:9px;color:#F97316">R$${fmt(l.valorPeca)}/pç</div>`:''}
              </span>
              <span style="font-family:monospace;font-size:13px;font-weight:700;text-align:right;color:var(--t1)">R$ ${fmt(l.valorLiq)}</span>
            </div>`).join('')}
        </div>

        <!-- Rodapé totais -->
        ${linhas.length>0?`
        <div style="display:grid;grid-template-columns:${COLS};padding:11px 16px;background:#F5EFE3;border-top:2px solid var(--border);align-items:center">
          <span style="grid-column:1/4;color:var(--t2);font-size:11px;font-family:monospace;font-weight:700">TOTAIS (${linhas.length} OPs)</span>
          <span></span>
          <span style="font-family:monospace;font-size:13px;font-weight:700;text-align:center;color:var(--t1)">${fmtN(totalPecas)}</span>
          <span style="font-family:monospace;font-size:13px;font-weight:700;text-align:center;color:var(--t1)">${fmtN(totalPecas)}</span>
          <span style="font-family:monospace;font-size:13px;font-weight:700;text-align:center;color:${totalFaltando>0?'#EF4444':'#10B981'}">
            ${totalFaltando>0?'−'+fmtN(totalFaltando):'✓'}
          </span>
          <span></span>
          <span style="font-family:monospace;font-size:13px;font-weight:700;text-align:right;color:#EF4444">
            ${totalDesconto>0?'−R$'+fmt(totalDesconto):'—'}
          </span>
          <span style="font-family:monospace;font-size:14px;font-weight:800;text-align:right;color:var(--t1)">R$ ${fmt(totalLiquido)}</span>
        </div>`:``}
      </div>

      <!-- HISTÓRICO DE PAGAMENTOS DO PERÍODO -->
      ${pgtosPeriodo.length>0?`
      <div class="card">
        <div class="card-header">
          <div><div class="ch-sub">registros no período</div><div class="ch-title">Pagamentos Realizados</div></div>
          <span style="background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;padding:4px 12px;color:#10B981;font-size:12px;font-family:monospace;font-weight:700">R$ ${fmt(totalPago)} pago</span>
        </div>
        ${pgtosPeriodo.map((p,i)=>{
          const _mc2={PIX:'#10B981',Transferência:'#10B981',Vale:'#EF4444',Adiantamento:'#F97316',Dinheiro:'#16A34A',Cheque:'#2563EB',Bradesco:'#E11D48',Inter:'#EA580C',Nubank:'#7C3AED','Mercado Pago':'#059669',BS2:'#0284C7',Cora:'#E11D48',Caixa:'#B45309'};
          const mc=_mc2[p.metodo]||'#888';
          return `<div style="display:grid;grid-template-columns:85px 100px 1fr 100px;padding:10px 18px;border-bottom:${i<pgtosPeriodo.length-1?'1px solid var(--border)':'none'};background:${i%2===0?'var(--bgcard)':'#FAF7F0'};align-items:center">
            <span style="font-family:monospace;color:var(--t3);font-size:11px">${fmtD(p.data)}</span>
            <span style="background:${mc}15;color:${mc};border:1px solid ${mc}30;border-radius:20px;padding:2px 9px;font-size:10px;font-family:monospace;font-weight:700">${p.metodo}</span>
            <span style="color:var(--t2);font-size:12px">${esc(p.obs||'—')}</span>
            <span style="font-family:monospace;font-size:14px;font-weight:700;color:#10B981;text-align:right">R$ ${fmt(p.valor)}</span>
          </div>`;
        }).join('')}
      </div>`:``}
      `}
    </div>

    <!-- COLUNA LATERAL: RESUMO -->
    <div style="display:flex;flex-direction:column;gap:12px;position:sticky;top:20px">

      ${!prof ? '' : `
      <!-- CARD PROFISSIONAL -->
      <div class="card" style="border-top:4px solid ${pc}">
        <div style="padding:18px">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
            <div style="width:48px;height:48px;border-radius:12px;background:${pc}18;border:2px solid ${pc}44;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:${pc};font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;flex-shrink:0">
              ${profObj&&profObj.foto?`<img src="${profObj.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`:prof[0]||'?'}
            </div>
            <div>
              <div style="font-size:18px;font-weight:800;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;color:var(--t1)">${esc(prof)}</div>
              <div style="font-size:11px;color:var(--t3);font-family:monospace">${profObj?profObj.profissao:''}</div>
            </div>
          </div>
          <div style="font-size:10px;color:var(--t3);font-family:monospace;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Período</div>
          <div style="font-size:13px;font-weight:700;font-family:monospace;color:var(--t1);margin-bottom:14px">${fmtD(de)} → ${fmtD(ate)}</div>

          <!-- RESUMO PAGAMENTOS -->
          <div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:12px">
            <div style="font-size:10px;color:var(--t3);font-family:monospace;font-weight:700;margin-bottom:8px">FORMA DE PAGAMENTO</div>
            ${[
              {l:'PIX / Transf.',  v:totalPix,    c:'#10B981'},
              {l:'Adiantamento',   v:totalAdiant, c:'#F59E0B'},
              {l:'Vale',           v:totalVale,   c:'#F97316'},
            ].map(r=>`
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <span style="font-size:11px;font-family:monospace;color:var(--t2)">${r.l}</span>
                <span style="font-size:12px;font-family:monospace;font-weight:${r.v>0?700:400};color:${r.v>0?r.c:'var(--t3)'}">${r.v>0?'R$ '+fmt(r.v):'—'}</span>
              </div>`).join('')}
          </div>

          <!-- RESUMO POR ETAPA -->
          ${etapasResumo.length>0?`
          <div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:12px">
            <div style="font-size:10px;color:var(--t3);font-family:monospace;font-weight:700;margin-bottom:8px">POR ETAPA</div>
            ${etapasResumo.map(e=>`
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:6px">
                  <div style="width:8px;height:8px;border-radius:2px;background:${e.cor}"></div>
                  <span style="font-size:11px;font-family:monospace;color:var(--t2)">${e.label}</span>

// Pega OPs vinculadas ao profissional com valor calculado
function _getOpsProfissional(profNome, etapaNome) {
  if(!profNome) return [];
  const etapasCfg = [
    {key:'costura',    label:'Costura',    profField:'prof_costura',    saiField:'costura', entField:'costura_ent'},
    {key:'travete',    label:'Travete',    profField:'prof_travete',    saiField:'travete', entField:'travete_ent'},
    {key:'lavanderia', label:'Lavanderia', profField:'prof_lavanderia', saiField:'lav',     entField:'lav_ent'},
    {key:'acabamento', label:'Acabamento', profField:'prof_acabamento', saiField:'acb',     entField:'acb_ent'},
  ];
  const profObj = STATE.profs.find(p=>p.nome.toUpperCase()===profNome.toUpperCase());
  const taxa    = profObj ? (profObj.vals?.FEM||0) : 0;
  const pagamentos = STATE.fin.pagamentos;
  const result  = [];

  STATE.ops.forEach(op=>{
    etapasCfg.forEach(cfg=>{
      const profVinc = (op[cfg.profField]||'').trim() || (cfg.key==='costura'?(op.costureiro||'').trim():'');
      if(profVinc.toUpperCase() !== profNome.toUpperCase()) return;
      // Filtro por etapa se especificado
      if(etapaNome && cfg.label !== etapaNome) return;
      const saida   = Number(op[cfg.saiField])||0;
      const entRaw  = op[cfg.entField];
      const entrada = (entRaw!==null&&entRaw!==undefined&&entRaw!=='')?Number(entRaw):null;
      if(!saida && entrada===null) return;
      const faltando   = (entrada!==null&&saida>0&&entrada>saida)?entrada-saida:0;
      const modeloObj  = STATE.modelos.find(m=>m.nome.toUpperCase()===op.modelo.toUpperCase());
      const valorPeca  = (modeloObj&&modeloObj.valor>0)?modeloObj.valor:null;
      const valorBruto = saida * taxa;
      const desconto   = valorPeca?faltando*valorPeca:faltando*taxa;
      const valorLiq   = valorBruto - desconto;
      // Verificar se já foi pago (aproximado — pagamentos desta OP nos registros)
      const pgOp = pagamentos.filter(pg=>
        pg.profissional.toUpperCase()===profNome.toUpperCase() &&
        (pg.obs||'').includes(op.op)
      ).reduce((a,pg)=>a+pg.valor,0);
      result.push({
        opCod:op.op, data:fmtDate(op.data), modelo:op.modelo,
        etapa:cfg.label, saida, entrada, faltando, taxa, valorLiq,
        pago: pgOp >= valorLiq && valorLiq > 0,
        opNum: Number(op.op.replace(/\D/g,'')),
      });
    });
  });
  return result.sort((a,b)=>b.opNum-a.opNum);
}

function _selecionarTodasOPs(sel) {
  document.querySelectorAll('[id^="op-chk-"]').forEach(chk=>{ chk.checked=sel; });
  recalcValorOPs();
}

function recalcValorOPs() {
  let total = 0;
  let ops   = [];
  document.querySelectorAll('[id^="op-chk-"]').forEach(chk=>{
    if(chk.checked){
      total += parseFloat(chk.value)||0;
      // pegar código da OP do label pai
      const row = chk.closest('label');
      if(row){
        const spans = row.querySelectorAll('span');
        if(spans[0]) ops.push(spans[0].textContent.trim());
      }
    }
  });
  const valInp = document.getElementById('fn-valor');
  if(valInp) valInp.value = total>0 ? Number(total.toFixed(2)) : '';
  const obsInp = document.getElementById('fn-obs');
  if(obsInp && ops.length>0) obsInp.value = ops.join(', ');
  const info = document.getElementById('fn-valor-info');
  if(info) info.textContent = ops.length>0 ? `${ops.length} OP(s) selecionada(s)` : '';
}

function savePag() {
  const prof  = document.getElementById('fn-prof').value;
  const valor = document.getElementById('fn-valor').value;
  const etapa = document.getElementById('fn-etapa').value;
  if(!prof){showToast('Selecione o profissional.','error');return;}
  if(!valor||Number(valor)<=0){showToast('Informe o valor.','error');return;}
  const novo = {
    id: Date.now(),
    data: document.getElementById('fn-data').value||today(),
    profissional: prof, etapa,
    metodo: document.getElementById('fn-metodo').value,
    valor: Number(valor),
    obs: document.getElementById('fn-obs').value||'',
  };
  STATE.fin.pagamentos.unshift(novo);
  if(window.fbSalvar) window.fbSalvar('fin');
  showToast(`Pagamento de R$ ${fmt(novo.valor)} para ${prof} registrado!`);
  closeModal(); renderFinanceiro();
}

function deletePag(id) {
  const pag=STATE.fin.pagamentos.find(p=>p.id===id);
  if(!pag||!confirm(`Tem certeza que deseja remover pagamento de R$ ${fmt(pag.valor)} para ${pag.profissional}?`)) return;
  STATE.fin.pagamentos=STATE.fin.pagamentos.filter(p=>p.id!==id);
  if(window.fbSalvar) window.fbSalvar('fin');
  renderFinanceiro();
}

function triggerAvatarUpload(profId) {
  let inp = document.getElementById('_avatar-inp');
  if(!inp){
    inp = document.createElement('input');
    inp.type='file'; inp.accept='image/*'; inp.id='_avatar-inp';
    inp.style.display='none';
    document.body.appendChild(inp);
  }
  inp.value='';
  inp.onchange = function(){
    const file = inp.files[0];
    if(!file) return;
    if(file.size > 4*1024*1024){ showToast('Imagem muito grande (máx 4MB).','error'); return; }
    const reader = new FileReader();
    reader.onload = function(e){
      const p = STATE.profs.find(x=>x.id===profId);
      if(p){
        p.foto = e.target.result;
        showToast('Foto atualizada!');
        // Re-render current prof page
        if(profState.selectedId!==null) renderProfissionais();
        else renderProfissionais();
      }
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function printOP(opCod) {
  const op = STATE.ops.find(o=>o.op===opCod);
  if(!op){ showToast('OP não encontrada.','error'); return; }

  const TAM = ['34','36','38','40','42','44','46','48','50','52','54'];

  const gradeAtual = op.grade || {};

  const inputs = TAM.map(t=>`

        oninput="recalcGradeTotal()"

               border-radius:7px;font-size:13px;font-family:monospace;background:var(--bgcard);
               color:var(--t1);outline:none"
        placeholder="0"/>
    </div>`).join('');

  const modalHtml = `
    <div style="margin-bottom:14px;color:var(--t2);font-size:12px;font-family:monospace">
      Informe a quantidade de peças por tamanho.<br/>
      O total será calculado automaticamente.

    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px">
      ${inputs}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;
         background:var(--bg);border-radius:10px;padding:12px 16px;margin-bottom:20px;
         border:2px solid var(--amber)">
      <div style="font-size:12px;font-family:monospace;color:var(--t2);font-weight:700">TOTAL DE PEÇAS</div>
      <div id="grade-total" style="font-size:26px;font-weight:900;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;color:var(--t1)">
        ${TAM.reduce((s,t)=>s+(Number(gradeAtual[t])||0),0)||op.pecas}
      </div>

      <button class="btn btn-outline" onclick="closeModal()">CANCELAR</button>
      <button class="btn btn-outline btn-sm" onclick="limparGrade()" style="color:var(--t3)">LIMPAR</button>

function recalcGradeTotal() {
  const TAM = ['34','36','38','40','42','44','46','48','50','52','54'];
  const total = TAM.reduce((s,t)=>{ const el=document.getElementById('grd-'+t); return s+(el?Number(el.value)||0:0); },0);
  const el = document.getElementById('grade-total');
  if(el) el.textContent = total.toLocaleString('pt-BR');
}

function limparGrade() {
  const TAM = ['34','36','38','40','42','44','46','48','50','52','54'];
  TAM.forEach(t=>{ const el=document.getElementById('grd-'+t); if(el) el.value=''; });
  recalcGradeTotal();
}

function confirmarImpressaoOP(opCod) {
  const op = STATE.ops.find(o=>o.op===opCod);
  if(!op) return;

  const TAM = ['34','36','38','40','42','44','46','48','50','52','54'];
  const grade = {};
  TAM.forEach(t=>{ const el=document.getElementById('grd-'+t); grade[t]=el?Number(el.value)||0:0; });
  const totalGrade = TAM.reduce((s,t)=>s+grade[t],0);

  // Salva grade na OP para lembrar na próxima vez
  op.grade = grade;
  if(totalGrade > 0) op.pecas = totalGrade;

  closeModal();
  _gerarFichaOP(op, grade, totalGrade||op.pecas);
}

<script>
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // SW inline via Blob — funciona sem arquivo externo
    const swCode = `
const CACHE_NAME = 'nlj-producao-v2';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(self.clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(response => {
        if (response && response.status === 200 && response.type === 'basic') {
          const clone = response.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
        }
        return response;
      }).catch(() => cached);
    })
  );
});
self.addEventListener('message', e => {
  if(e.data && e.data.type === 'SKIP_WAITING') self.skipWaiting();
});
`;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl)
      .then(r => console.log('SW registrado (inline):', r.scope))
      .catch(e => console.log('SW info:', e));
  });

function calcDiffEtapa(keyEnt, keySai, divId) {
  const ent = Number(document.getElementById('f-'+keyEnt)?.value||0);
  const sai = Number(document.getElementById('f-'+keySai)?.value||0);
  const box = document.getElementById(divId);
  if(!box) return;
  if(ent>0 && sai>0 && ent!==sai) {
    const diff = ent - sai;
    if(diff>0) {
      box.innerHTML = '<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:4px 10px;font-size:11px;font-family:monospace;color:#EF4444;font-weight:700;margin-top:8px">⚠ '+diff+' peça(s) faltando</div>';
    } else {
      box.innerHTML = '<div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:6px;padding:4px 10px;font-size:11px;font-family:monospace;color:#F97316;font-weight:700;margin-top:8px">⚠ Saída maior que entrada ('+Math.abs(diff)+' peças)</div>';
    }
  } else {
    box.innerHTML = '';
  }
}

function saveModelo(isEdit, id) {
  const nome  = document.getElementById('mod-nome').value.trim().toUpperCase();
  const valor = parseFloat(document.getElementById('mod-valor').value)||0;
  if(!nome){ showToast('Informe o nome do modelo.','error'); return; }
  if(isEdit) {
    const idx = STATE.modelos.findIndex(m=>m.id===id);
    if(idx>=0) STATE.modelos[idx] = {...STATE.modelos[idx], valor};
    if(window.fbSalvar) window.fbSalvar('modelos');
    showToast('Modelo atualizado!');
  } else {
    if(STATE.modelos.find(m=>m.nome===nome)){ showToast('Modelo já cadastrado.','error'); return; }
    STATE.modelos.push({id:Date.now(), nome, valor});
    if(window.fbSalvar) window.fbSalvar('modelos');
    showToast('Modelo cadastrado!');
  }
  closeModal(); renderModelos();
}

function deleteModelo(id) {
  const m = STATE.modelos.find(x=>x.id===id);
  if(!m||!confirm(`Remover modelo "${m.nome}"?`)) return;
  STATE.modelos = STATE.modelos.filter(x=>x.id!==id);
  if(window.fbSalvar) window.fbSalvar('modelos');
  showToast('Modelo removido.','error');
  renderModelos();
}

function importarModelosOPs() {
  const modelosOPs = [...new Set(STATE.ops.map(o=>o.modelo.trim().toUpperCase()))];
  const nomesCad   = new Set(STATE.modelos.map(m=>m.nome.toUpperCase()));
  const novos = modelosOPs.filter(m=>!nomesCad.has(m));
  novos.forEach(nome=>{
    STATE.modelos.push({id:Date.now()+Math.random(), nome, valor:0});
  });
  showToast(`${novos.length} modelo(s) importados! Agora preencha os valores.`);
  renderModelos();
}

  const porBanco = contas.map(b=>{
